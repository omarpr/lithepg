  <text x="80" y="135" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#93c5fd">Slice: Homebrew cask macOS requirement gate — 2026-05-30 19:28 EDT</text>

  <rect x="80" y="170" width="1120" height="92" rx="10" fill="#062e23" stroke="#10b981" stroke-width="1.5"/>
