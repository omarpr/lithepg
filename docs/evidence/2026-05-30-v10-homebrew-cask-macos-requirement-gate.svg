<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 Homebrew cask macOS requirement gate evidence</title>
  <desc id="desc">Visual evidence for the release preflight slice that blocks publication unless the Homebrew cask declares depends_on macos >= :sonoma.</desc>
