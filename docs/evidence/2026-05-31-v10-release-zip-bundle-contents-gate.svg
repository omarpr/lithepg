<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip bundle contents gate evidence</title>
  <desc id="desc">Evidence screenshot showing the release gate hardening command outputs for requiring LithePG.app bundle contents in the public zip artifact.</desc>
  <rect width="1180" height="680" fill="#0d1117"/>
  <rect x="32" y="32" width="1116" height="616" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="64" y="86" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 release zip bundle contents gate</text>
  <text x="64" y="124" fill="#8b949e" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">2026-05-31 00:37 EDT · local shell/docs release-preflight slice</text>

  <rect x="64" y="160" width="1052" height="392" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="88" y="204" fill="#7ee787" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ bash script/test_v10_release_gate.sh</text>
  <text x="88" y="236" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">test_v10_release_gate passed</text>

  <text x="88" y="292" fill="#7ee787" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh</text>
  <text x="88" y="324" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">exit 0 · no output</text>

  <text x="88" y="380" fill="#7ee787" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ git diff --check</text>
  <text x="88" y="412" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">exit 0 · no whitespace errors</text>

  <text x="88" y="468" fill="#7ee787" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ static added-line security scan</text>
  <text x="88" y="500" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">no hardcoded secrets, shell injection, eval/exec, pickle, or SQL-format hits</text>

  <rect x="64" y="582" width="1052" height="42" rx="10" fill="#102a43" stroke="#1f6feb"/>
  <text x="88" y="609" fill="#d2e8ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Gate now requires LithePG.app/Contents/Info.plist and Contents/MacOS/LithePGApp inside LithePG.app.zip.</text>
</svg>
