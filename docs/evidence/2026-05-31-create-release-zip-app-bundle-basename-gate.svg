<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip app bundle basename gate evidence</title>
  <desc id="desc">Visual evidence for the strict-TDD hardening slice that makes create_release_zip reject non-canonical app bundle names.</desc>
  <rect width="1180" height="520" fill="#0b1020"/>
  <rect x="32" y="28" width="1116" height="464" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="64" y="76" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="26" font-weight="700">LithePG v1.0 release helper gate</text>
  <text x="64" y="112" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="17">2026-05-31 14:24 EDT · create_release_zip.sh</text>

  <rect x="64" y="145" width="1052" height="96" rx="12" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
  <text x="88" y="180" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">RED</text>
  <text x="150" y="180" fill="#f9fafb" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_create_release_zip.sh</text>
  <text x="150" y="211" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="15">test_create_release_zip failed: helper unexpectedly packaged a non-canonical app bundle name</text>

  <rect x="64" y="265" width="1052" height="114" rx="12" fill="#102a1c" stroke="#22c55e" stroke-width="1.5"/>
  <text x="88" y="300" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">GREEN</text>
  <text x="172" y="300" fill="#f9fafb" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_create_release_zip.sh &amp;&amp; bash -n ... &amp;&amp; git diff --check</text>
  <text x="172" y="331" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="15">test_create_release_zip passed</text>
  <text x="172" y="360" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="15">Spec review: PASS · Code quality/security review: APPROVED</text>

  <rect x="64" y="405" width="1052" height="54" rx="12" fill="#172554" stroke="#60a5fa" stroke-width="1"/>
  <text x="88" y="438" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="15">Behavior: package_verify still runs, then non-LithePG.app basenames are refused before zip creation. No publication/signing/upload/tag.</text>
</svg>
