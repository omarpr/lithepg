  <text x="224" y="520" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">./script/v10_release_gate.sh --check-remote</text>
  <text x="88" y="556" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">origin has v0.5; origin has no v1.0; publication remains blocked on expected local/external prerequisites.</text>
  <text x="88" y="582" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="16">No signing, notarization, upload, Homebrew publication, tag, cron change, or external publication attempted.</text>

  <text x="64" y="642" fill="#94a3b8" font-family="Menlo, Consolas, monospace" font-size="15">Scope: reject LITHEPG_NOTARY_ZIP basename variants such as lithepg.app.zip so notary intermediates cannot masquerade as public artifacts on case-insensitive filesystems.</text>
