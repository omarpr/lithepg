  <text x="160" y="188" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">bash script/test_sign_and_notarize.sh</text>
  <text x="88" y="224" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="16">failed first:</text>
  <text x="216" y="224" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">dry run unexpectedly passed with case-variant public release artifact notary zip basename</text>

  <rect x="64" y="296" width="1072" height="164" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="88" y="332" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">GREEN</text>
  <text x="184" y="332" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">case-folded basename rejection implemented</text>
  <text x="88" y="368" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">test_sign_and_notarize, create_release_zip, and v10_release_gate shell suites passed</text>
  <text x="88" y="404" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">bash -n script/sign_and_notarize.sh script/test_sign_and_notarize.sh &amp;&amp; git diff --check</text>
  <text x="88" y="434" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">passed; DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift build passed</text>

  <rect x="64" y="484" width="1072" height="110" rx="12" fill="#1f2937" stroke="#475569"/>
