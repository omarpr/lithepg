  <text x="64" y="118" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">Artifact: docs/evidence/2026-05-31-sign-notarize-public-release-zip-casefold-basename-gate.svg</text>

  <rect x="64" y="152" width="1072" height="120" rx="12" fill="#1f2937" stroke="#475569"/>
