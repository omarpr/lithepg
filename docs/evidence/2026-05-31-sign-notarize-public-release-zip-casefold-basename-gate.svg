<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 signing/notarization public release zip casefold basename gate evidence</title>
  <desc id="desc">Evidence screenshot artifact showing TDD verification and release preflight blocker status for the signing/notarization notary zip casefold public artifact basename gate.</desc>
