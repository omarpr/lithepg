<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 Homebrew cask homepage gate evidence</title>
  <desc id="desc">Visual evidence that the fast release preflight now validates the Homebrew cask homepage and that focused shell verification passed.</desc>
  <rect width="1180" height="680" fill="#0b1020"/>
  <rect x="40" y="36" width="1100" height="608" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="72" y="86" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 release preflight</text>
  <text x="72" y="122" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">Homebrew cask homepage gate — 2026-05-30</text>

  <rect x="72" y="156" width="1036" height="126" rx="14" fill="#0f172a" stroke="#1e293b"/>
  <text x="96" y="194" fill="#f8fafc" font-family="Menlo, Consolas, monospace" font-size="20" font-weight="700">Required homepage</text>
  <text x="96" y="228" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">homepage "https://github.com/omarpr/lithepg"</text>
  <text x="96" y="258" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="17">Blocks redacted statuses: mismatch / missing</text>

  <rect x="72" y="314" width="1036" height="210" rx="14" fill="#020617" stroke="#1e293b"/>
  <text x="96" y="350" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="18">RED: gate unexpectedly passed with mismatched Homebrew cask homepage</text>
  <text x="96" y="394" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="18">GREEN: bash script/test_v10_release_gate.sh → passed</text>
  <text x="96" y="430" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="18">GREEN: bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh</text>
  <text x="96" y="466" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="18">CHECK: ./script/v10_release_gate.sh --check-remote remained blocked safely</text>
  <text x="96" y="502" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">No signing, notarization, upload, Homebrew publication, tag, or cron changes.</text>

  <rect x="72" y="556" width="320" height="58" rx="12" fill="#064e3b" stroke="#10b981"/>
  <text x="98" y="593" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">SPEC REVIEW: PASS</text>
  <rect x="420" y="556" width="370" height="58" rx="12" fill="#064e3b" stroke="#10b981"/>
  <text x="446" y="593" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">QUALITY REVIEW: APPROVED</text>
  <rect x="818" y="556" width="290" height="58" rx="12" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="844" y="593" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">NO PUBLICATION</text>
</svg>
