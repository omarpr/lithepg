<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip approved symlink overwrite gate evidence</title>
  <desc id="desc">Visual evidence for the 2026-05-31 create_release_zip approved symlink overwrite hardening slice.</desc>
  <rect width="1180" height="720" fill="#0f172a"/>
  <rect x="32" y="32" width="1116" height="656" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="64" y="82" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 release helper gate</text>
  <text x="64" y="122" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">2026-05-31 09:26 EDT — approved symlink overwrite safety</text>

  <rect x="64" y="154" width="1052" height="168" rx="12" fill="#020617" stroke="#334155"/>
  <text x="88" y="192" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">Behavior hardened</text>
  <text x="88" y="228" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">Approved output replacement now stages the public zip in a temp directory,</text>
  <text x="88" y="258" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">then uses POSIX rename to replace the destination without following symlinks.</text>
  <text x="112" y="292" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="16">mktemp -d → ditto "$temp_zip" → rename($ARGV[0], $ARGV[1])</text>

  <rect x="64" y="346" width="1052" height="206" rx="12" fill="#020617" stroke="#334155"/>
  <text x="88" y="384" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">TDD + verification receipt</text>
  <text x="88" y="420" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="16">RED: bash script/test_create_release_zip.sh</text>
  <text x="112" y="448" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="15">failed: approved dangling output symlink was not replaced with a regular zip</text>
  <text x="88" y="484" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">GREEN: bash script/test_create_release_zip.sh → test_create_release_zip passed</text>
  <text x="88" y="514" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">bash -n both helper/test scripts + git diff --check → passed</text>

  <rect x="64" y="576" width="1052" height="72" rx="12" fill="#052e16" stroke="#22c55e"/>
  <text x="88" y="606" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="16">Release-impact gate: swift build + dogfood_check passed.</text>
  <text x="88" y="634" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="15">Dogfood artifacts: .build/dogfood-checks/20260531-094208/</text>
</svg>
