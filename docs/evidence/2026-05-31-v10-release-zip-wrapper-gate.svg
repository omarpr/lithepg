<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip wrapper gate evidence</title>
  <desc id="desc">Visual evidence for the release preflight zip wrapper TDD slice and verification commands.</desc>
  <rect width="1280" height="720" fill="#0d1117"/>
  <rect x="48" y="42" width="1184" height="636" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="78" y="92" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="30" font-weight="700" fill="#f0f6fc">LithePG v1.0 fast preflight hardening</text>
  <text x="78" y="128" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" fill="#8b949e">2026-05-31 · release zip wrapper gate</text>

  <rect x="78" y="164" width="1124" height="398" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="104" y="204" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#ff7b72">RED $ bash script/test_v10_release_gate.sh</text>
  <text x="104" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">test_v10_release_gate failed: gate unexpectedly passed with release artifact missing top-level LithePG.app wrapper</text>

  <text x="104" y="286" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">GREEN $ bash script/test_v10_release_gate.sh</text>
  <text x="104" y="316" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">test_v10_release_gate passed</text>

  <text x="104" y="368" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh</text>
  <text x="104" y="398" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">passed with no output</text>

  <text x="104" y="450" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ git diff --check</text>
  <text x="104" y="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">passed with no output</text>

  <text x="104" y="532" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f0f6fc">Zip contents were inspected via /usr/bin/zipinfo, not extracted or printed.</text>

  <rect x="78" y="592" width="1124" height="56" rx="10" fill="#10281c" stroke="#238636"/>
  <text x="104" y="627" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20" fill="#7ee787">No signing, notarization, upload, Homebrew publication, tag, cron changes, or external publication attempted.</text>
</svg>
