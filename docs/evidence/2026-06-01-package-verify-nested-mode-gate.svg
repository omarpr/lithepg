<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier nested mode gate evidence</title>
  <desc id="desc">Strict TDD receipt for rejecting unsafe nested directory and file modes inside LithePG.app.</desc>
  <rect width="1180" height="520" fill="#0b1020"/>
  <rect x="28" y="28" width="1124" height="464" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="56" y="72" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="26" font-weight="700">2026-06-01 package_verify nested mode hardening</text>
  <text x="56" y="116" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="17">Scope: non-essential nested regular files and directories inside LithePG.app</text>

  <text x="56" y="170" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">RED</text>
  <text x="120" y="170" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_package_verify.sh</text>
  <text x="120" y="198" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="15">failed: verifier accepted unsafe mode 775 on a nested app-bundle directory</text>
  <text x="120" y="224" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="15">old behavior printed package verification success before the new gate existed</text>

  <text x="56" y="278" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">GREEN</text>
  <text x="120" y="278" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_package_verify.sh — passed</text>
  <text x="120" y="306" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">bash -n script/package_verify.sh script/test_package_verify.sh — passed</text>
  <text x="120" y="334" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">git diff --check — passed</text>
  <text x="120" y="362" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">adjacent release-helper tests — passed</text>

  <text x="56" y="420" fill="#fde68a" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700">Result</text>
  <text x="120" y="420" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">Generic failures only: unsafe directory mode / unsafe file mode.</text>
  <text x="120" y="448" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">No signing, notarization, upload, tag, push, cron change, or external publication.</text>
</svg>
