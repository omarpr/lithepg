<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 Homebrew cask version gate evidence</title>
  <desc id="desc">Visual release-gate evidence showing the Homebrew cask version preflight, TDD checks, and expected publication blockers.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="42" y="42" width="1116" height="676" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="80" y="104" fill="#e5e7eb" font-family="Menlo, Monaco, monospace" font-size="32" font-weight="700">LithePG v1.0 release preflight hardening</text>
  <text x="80" y="150" fill="#93c5fd" font-family="Menlo, Monaco, monospace" font-size="20">Slice: Homebrew cask version must match requested release version</text>
  <text x="80" y="184" fill="#94a3b8" font-family="Menlo, Monaco, monospace" font-size="18">Captured: 2026-05-30 18:01 EDT · Repo: /Users/omar/projects/lithepg</text>

  <g transform="translate(80 230)">
    <rect width="500" height="120" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="24" y="42" fill="#bbf7d0" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">TDD gate</text>
    <text x="24" y="78" fill="#dcfce7" font-family="Menlo, Monaco, monospace" font-size="18">RED: mismatched cask version passed unexpectedly</text>
    <text x="24" y="104" fill="#dcfce7" font-family="Menlo, Monaco, monospace" font-size="18">GREEN: bash script/test_v10_release_gate.sh → passed</text>
  </g>

  <g transform="translate(620 230)">
    <rect width="500" height="120" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="24" y="42" fill="#bae6fd" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">Verification</text>
    <text x="24" y="78" fill="#e0f2fe" font-family="Menlo, Monaco, monospace" font-size="18">bash -n release scripts → passed</text>
    <text x="24" y="104" fill="#e0f2fe" font-family="Menlo, Monaco, monospace" font-size="18">swift build → Build complete! (5.41s)</text>
  </g>

  <g transform="translate(80 390)">
    <rect width="1040" height="190" rx="18" fill="#1e1b4b" stroke="#a78bfa" stroke-width="2"/>
    <text x="24" y="42" fill="#ddd6fe" font-family="Menlo, Monaco, monospace" font-size="22" font-weight="700">New preflight behavior</text>
    <text x="24" y="82" fill="#ede9fe" font-family="Menlo, Monaco, monospace" font-size="18">Homebrew cask placeholders: none found</text>
    <text x="24" y="112" fill="#ede9fe" font-family="Menlo, Monaco, monospace" font-size="18">Homebrew cask version: matches | mismatch | missing</text>
    <text x="24" y="142" fill="#ede9fe" font-family="Menlo, Monaco, monospace" font-size="18">Mismatch/missing blocks v1.0 publication before tag/release/tap actions</text>
    <text x="24" y="172" fill="#ede9fe" font-family="Menlo, Monaco, monospace" font-size="18">Placeholder casks stay blocked by placeholder scan without extra version noise</text>
  </g>

  <g transform="translate(80 620)">
    <rect width="1040" height="58" rx="14" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
    <text x="24" y="37" fill="#fef3c7" font-family="Menlo, Monaco, monospace" font-size="18">Current real preflight is safely blocked: v0.5 present, v1.0 absent, external release approvals/artifact placeholders unresolved.</text>
  </g>
