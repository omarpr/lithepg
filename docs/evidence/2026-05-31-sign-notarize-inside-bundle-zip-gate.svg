<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 signing/notarization inside-bundle zip gate evidence</title>
  <desc id="desc">Text receipt showing RED and GREEN verification for refusing LITHEPG_NOTARY_ZIP paths inside LithePG.app without leaking signing or notary values.</desc>
  <rect width="1280" height="720" fill="#0f172a"/>
  <rect x="38" y="34" width="1204" height="652" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="64" y="78" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">v1.0 release hardening: notary zip outside .app</text>
  <text x="64" y="118" fill="#94a3b8" font-family="Menlo, Consolas, monospace" font-size="18">2026-05-31 07:39 EDT · script/sign_and_notarize.sh · dry-run safe</text>

  <text x="64" y="170" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">RED</text>
  <text x="124" y="170" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="20">bash script/test_sign_and_notarize.sh</text>
  <text x="94" y="210" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Added failing coverage for LITHEPG_NOTARY_ZIP under:</text>
  <text x="94" y="238" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">$app_bundle/Contents/Resources/LithePG-notary.zip</text>
  <text x="94" y="276" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="18">Expected pre-fix failure:</text>
  <text x="94" y="304" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="18">test_sign_and_notarize failed: dry run unexpectedly passed with inside-bundle notary zip</text>

  <text x="64" y="362" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">GREEN</text>
  <text x="154" y="362" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="20">minimal guard added before dry-run success and before rm/codesign/ditto</text>
  <text x="94" y="402" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Blocker text: sign/notarize failed: notary zip must not be inside app bundle</text>
  <text x="94" y="430" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Sentinel signing identity and notary profile remained absent from captured output.</text>
  <text x="94" y="458" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">Dry-run did not create the inside-bundle zip.</text>

  <text x="64" y="518" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">FINAL VERIFICATION</text>
  <text x="94" y="558" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">$ bash script/test_sign_and_notarize.sh</text>
  <text x="94" y="586" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="18">test_sign_and_notarize passed</text>
  <text x="94" y="622" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">$ bash -n script/sign_and_notarize.sh script/test_sign_and_notarize.sh</text>
  <text x="94" y="650" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="18">passed with no output</text>
  <text x="670" y="650" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">$ git diff --check</text>
  <text x="920" y="650" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="18">passed with no output</text>
</svg>
