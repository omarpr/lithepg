<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">LithePG create_release_zip output basename gate evidence</title>
  <desc id="desc">Visual evidence that the release zip helper now rejects non-canonical output zip basenames and passes focused verification.</desc>
  <rect width="1180" height="560" fill="#0b1020"/>
  <rect x="32" y="32" width="1116" height="496" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="64" y="84" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#e5e7eb">LithePG v1.0 release helper hardening</text>
  <text x="64" y="122" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">2026-05-31 14:40 EDT · create_release_zip output basename gate</text>

  <rect x="64" y="156" width="1052" height="252" rx="12" fill="#020617" stroke="#1e293b"/>
  <text x="88" y="194" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">$ bash script/test_create_release_zip.sh</text>
  <text x="88" y="226" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#86efac">test_create_release_zip passed</text>
  <text x="88" y="274" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">$ bash -n script/create_release_zip.sh script/test_create_release_zip.sh</text>
  <text x="88" y="306" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#86efac">passed · exit 0</text>
  <text x="88" y="354" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#cbd5e1">$ git diff --check</text>
  <text x="88" y="386" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#86efac">passed · no whitespace errors</text>

  <rect x="64" y="436" width="1052" height="58" rx="12" fill="#052e16" stroke="#166534"/>
  <text x="88" y="472" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#bbf7d0">Gate added: output zip basename must be exactly LithePG.app.zip; non-canonical output paths create no zip.</text>
</svg>
