<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="720" viewBox="0 0 1220 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package_verify help gate evidence</title>
  <desc id="desc">Strict TDD evidence for adding safe -h and --help handling to script/package_verify.sh without publication, signing, notarization, tagging, or network upload.</desc>
  <rect width="1220" height="720" fill="#0f172a"/>
  <rect x="34" y="34" width="1152" height="652" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="62" y="78" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">LithePG local release-script hardening: package_verify help gate</text>
  <text x="62" y="114" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="15">Safe local slice: treat -h/--help as options, not bundle paths, and print static usage only.</text>

  <rect x="62" y="142" width="1096" height="128" rx="10" fill="#1f2937" stroke="#ef4444" stroke-width="1.5"/>
  <text x="84" y="174" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">RED — new shell test fails before implementation</text>
  <text x="84" y="204" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ bash script/test_package_verify.sh</text>
  <text x="84" y="230" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="14">package verification failed: app bundle not found: --help</text>
  <text x="84" y="252" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="14">test_package_verify failed: package verifier --help unexpectedly failed</text>

  <rect x="62" y="292" width="1096" height="126" rx="10" fill="#1f2937" stroke="#22c55e" stroke-width="1.5"/>
  <text x="84" y="324" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">GREEN — minimal implementation</text>
  <text x="84" y="354" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">script/package_verify.sh now handles -h|--help before app bundle validation.</text>
  <text x="104" y="380" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="14">Usage lists APP_BUNDLE plus LITHEPG_EXPECTED_MARKETING_VERSION / BUILD_VERSION.</text>
  <text x="84" y="404" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="14">$ ./script/test_package_verify.sh  →  test_package_verify passed</text>

  <rect x="62" y="440" width="1096" height="184" rx="10" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="84" y="472" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">Verification run after the slice</text>
  <text x="84" y="502" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ ./script/test_package_verify.sh  →  test_package_verify passed</text>
  <text x="84" y="526" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ bash -n script/package_verify.sh script/test_package_verify.sh  →  passed</text>
  <text x="84" y="552" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ ./script/test_create_release_zip.sh  →  test_create_release_zip passed</text>
  <text x="84" y="576" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ ./script/test_sign_and_notarize.sh  →  test_sign_and_notarize passed</text>
  <text x="84" y="600" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">$ ./script/test_v10_release_gate.sh  →  test_v10_release_gate passed</text>
  <text x="84" y="624" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="14">Independent reviews: spec PASS; code quality/security APPROVED.</text>

  <text x="62" y="660" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="14">No signing, notarization, upload, GitHub Release, tag, cron, or external publication action performed.</text>
</svg>
