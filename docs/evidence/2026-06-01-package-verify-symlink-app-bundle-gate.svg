<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier symlink app-bundle gate evidence</title>
  <desc id="desc">Visual receipt showing the v1.0 package verifier rejects symlinked LithePG.app input paths, including trailing slash and dangling final-component symlink variants, and that adjacent release-helper checks passed.</desc>
  <rect width="1200" height="780" fill="#0f172a"/>
  <rect x="36" y="36" width="1128" height="708" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>

  <text x="72" y="96" fill="#e5e7eb" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">v1.0 package verifier hardening</text>
  <text x="72" y="140" fill="#93c5fd" font-family="SF Mono, Menlo, monospace" font-size="22">2026-06-01 · script/package_verify.sh symlink input gate</text>

  <rect x="72" y="180" width="1056" height="142" rx="18" fill="#1f2937" stroke="#f97316" stroke-width="2"/>
  <text x="104" y="226" fill="#fed7aa" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">RED</text>
  <text x="104" y="266" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">bash script/test_package_verify.sh</text>
  <text x="104" y="296" fill="#fdba74" font-family="SF Mono, Menlo, monospace" font-size="18">dangling symlink RED: expected generic symlink error before -d dereference</text>

  <rect x="72" y="354" width="1056" height="152" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="104" y="400" fill="#bfdbfe" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Gate added</text>
  <text x="104" y="440" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">After name checks, reject symlinked app-bundle input paths before the -d existence check.</text>
  <text x="104" y="470" fill="#bfdbfe" font-family="SF Mono, Menlo, monospace" font-size="18">Error: package verification failed: app bundle path must not be a symlink</text>

  <rect x="72" y="538" width="1056" height="154" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="104" y="584" fill="#86efac" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">GREEN + adjacent checks</text>
  <text x="104" y="624" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">bash script/test_package_verify.sh → test_package_verify passed</text>
  <text x="104" y="654" fill="#bbf7d0" font-family="SF Mono, Menlo, monospace" font-size="18">bash -n script/package_verify.sh script/test_package_verify.sh · git diff --check</text>
  <text x="104" y="682" fill="#bbf7d0" font-family="SF Mono, Menlo, monospace" font-size="18">test_create_release_zip · test_sign_and_notarize · test_v10_release_gate: passed</text>
</svg>
