<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip physical inside-bundle symlink gate evidence</title>
  <desc id="desc">Visual evidence for the 2026-05-31 create_release_zip hardening slice rejecting symlinked, symlink-plus-parent-traversal, and case-variant outputs that resolve into the app bundle.</desc>
  <rect width="1180" height="720" fill="#0f172a"/>
  <rect x="32" y="32" width="1116" height="656" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="64" y="82" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 release helper gate</text>
  <text x="64" y="122" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">2026-05-31 09:58 EDT — physical inside-bundle output rejection</text>

  <rect x="64" y="154" width="1052" height="190" rx="12" fill="#020617" stroke="#334155"/>
  <text x="88" y="192" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">Behavior hardened</text>
  <text x="88" y="228" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">create_release_zip now rejects an output zip whose resolved physical path</text>
  <text x="88" y="258" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="16">lands inside dist/LithePG.app through symlinks, .., or casing drift.</text>
  <text x="112" y="292" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="16">dist/out-link -&gt; dist/LithePG.app/Contents</text>
  <text x="112" y="322" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="16">dist/lithepg.app/Contents/LithePG.app.zip ⇒ rejected on macOS</text>

  <rect x="64" y="368" width="1052" height="206" rx="12" fill="#020617" stroke="#334155"/>
  <text x="88" y="406" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">TDD + verification receipt</text>
  <text x="88" y="442" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="16">RED: bash script/test_create_release_zip.sh</text>
  <text x="112" y="470" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="15">failed: helper unexpectedly allowed case-variant output inside app</text>
  <text x="88" y="506" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">GREEN: bash script/test_create_release_zip.sh → test_create_release_zip passed</text>
  <text x="88" y="536" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">bash -n + diff check + swift build + dogfood_check → passed</text>

  <rect x="64" y="598" width="1052" height="58" rx="12" fill="#052e16" stroke="#22c55e"/>
  <text x="88" y="634" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="15">No signing, notarization, upload, tag, push, cron changes, or external publication.</text>
</svg>
