<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier Info.plist mode hardening evidence</title>
  <desc id="desc">Evidence card showing TDD failure, green verification, and dogfood metrics for rejecting unsafe Info.plist modes in the local package verifier.</desc>
  <rect width="1200" height="680" rx="36" fill="#0f172a"/>
  <rect x="56" y="56" width="1088" height="568" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="96" y="126" fill="#e5e7eb" font-family="SF Pro Display, Arial, sans-serif" font-size="34" font-weight="700">LithePG v1.0 package verifier hardening</text>
  <text x="96" y="174" fill="#93c5fd" font-family="SF Pro Text, Arial, sans-serif" font-size="24">Info.plist mode safety check</text>

  <rect x="96" y="220" width="1008" height="118" rx="18" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="126" y="260" fill="#fecaca" font-family="SF Mono, Menlo, monospace" font-size="18">RED: package verifier unexpectedly accepted special mode 4755 on Info.plist</text>
  <text x="126" y="298" fill="#fecaca" font-family="SF Mono, Menlo, monospace" font-size="18">Expected generic failure: package verification failed: Info.plist mode is unsafe</text>

  <rect x="96" y="364" width="1008" height="146" rx="18" fill="#13251a" stroke="#22c55e" stroke-width="2"/>
  <text x="126" y="404" fill="#86efac" font-family="SF Mono, Menlo, monospace" font-size="18">GREEN: test_package_verify, release helper tests, git diff --check passed</text>
  <text x="126" y="442" fill="#86efac" font-family="SF Mono, Menlo, monospace" font-size="18">Swift: build passed; swift test passed (127 tests / 20 suites)</text>
  <text x="126" y="480" fill="#86efac" font-family="SF Mono, Menlo, monospace" font-size="18">Dogfood: .build/dogfood-checks/20260531-230359 passed</text>

  <rect x="96" y="536" width="1008" height="58" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="126" y="573" fill="#bfdbfe" font-family="SF Mono, Menlo, monospace" font-size="17">Metrics: shell 132.14 ms · cold start 233.83 ms · binary 21.379 MiB raw / 11.980 MiB stripped</text>
</svg>
