<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">v1.0 release zip Hardened Runtime gate evidence</title>
  <desc id="desc">Safe visual receipt for the release-gate TDD slice requiring Hardened Runtime in the embedded app code signature.</desc>
  <rect width="920" height="520" rx="28" fill="#0f172a"/>
  <text x="48" y="64" fill="#e5e7eb" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">LithePG v1.0 release zip Hardened Runtime gate</text>
  <text x="48" y="100" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">2026-05-31 • redacted shell TDD receipt • no signing identities, SHA values, or archive contents</text>

  <g transform="translate(48 140)">
    <rect width="824" height="120" rx="18" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
    <text x="28" y="38" fill="#fecaca" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700">RED</text>
    <text x="28" y="70" fill="#fee2e2" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_v10_release_gate.sh</text>
    <text x="28" y="98" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">failed: gate unexpectedly passed with release artifact code signature missing Hardened Runtime</text>
  </g>

  <g transform="translate(48 284)">
    <rect width="824" height="132" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
    <text x="28" y="38" fill="#bbf7d0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700">GREEN</text>
    <text x="28" y="70" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_v10_release_gate.sh → passed</text>
    <text x="28" y="98" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh → passed</text>
    <text x="28" y="122" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">git diff --check → passed</text>
  </g>

  <g transform="translate(48 448)">
    <rect width="824" height="34" rx="17" fill="#1e293b"/>
    <text x="24" y="23" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">safe statuses: runtime present | missing | could not inspect</text>
  </g>
