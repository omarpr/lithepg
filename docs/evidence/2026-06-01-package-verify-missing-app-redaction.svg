<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier missing-app redaction gate evidence</title>
  <desc id="desc">Visual receipt for the package verifier missing app path redaction hardening and verification commands.</desc>
  <rect width="1180" height="720" fill="#0f172a"/>
  <rect x="34" y="34" width="1112" height="652" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="64" y="86" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="26" font-weight="700">LithePG v1.0 package verifier hardening</text>
  <text x="64" y="122" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">Slice: missing app bundle path redaction</text>

  <rect x="64" y="154" width="1052" height="124" rx="14" fill="#0b1220" stroke="#334155"/>
  <text x="88" y="194" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">Behavior changed</text>
  <text x="88" y="226" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="16">Before: package verification failed: app bundle not found: &lt;caller path&gt;</text>
  <text x="88" y="252" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="16">After:  package verification failed: app bundle not found</text>

  <rect x="64" y="306" width="1052" height="274" rx="14" fill="#020617" stroke="#334155"/>
  <text x="88" y="346" fill="#fbbf24" font-family="Menlo, Consolas, monospace" font-size="18">Verification run</text>
  <text x="88" y="382" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">$ bash script/test_package_verify.sh</text>
  <text x="88" y="408" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="15">test_package_verify passed</text>
  <text x="88" y="442" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">$ bash script/test_create_release_zip.sh &amp;&amp; bash script/test_sign_and_notarize.sh &amp;&amp; bash script/test_v10_release_gate.sh</text>
  <text x="88" y="468" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="15">test_create_release_zip passed / test_sign_and_notarize passed / test_v10_release_gate passed</text>
  <text x="88" y="502" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">$ bash -n script/package_verify.sh script/test_package_verify.sh &amp;&amp; git diff --check</text>
  <text x="88" y="528" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="15">passed with no output</text>
  <text x="88" y="562" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="15">$ DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift build</text>

  <rect x="64" y="606" width="1052" height="48" rx="12" fill="#052e16" stroke="#22c55e"/>
  <text x="88" y="637" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">Package smoke also passed: build_and_run.sh --package verified dist/LithePG.app (11.93 MiB packaged executable).</text>
</svg>
