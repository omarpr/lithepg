<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip bundle file type gate evidence</title>
  <desc id="desc">Visual evidence for the v1.0 release preflight gate that rejects symlinked or uninspectable essential bundle files in LithePG.app.zip.</desc>
  <rect width="1280" height="720" fill="#0b1020"/>
  <rect x="48" y="44" width="1184" height="632" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="96" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" fill="#e5e7eb">LithePG v1.0 release zip bundle file type gate</text>
  <text x="80" y="138" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#93c5fd">Evidence artifact: docs/evidence/2026-05-31-v10-release-zip-bundle-file-types-gate.svg</text>

  <rect x="80" y="174" width="1120" height="142" rx="16" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
  <text x="112" y="216" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#bfdbfe">Gate behavior added</text>
  <text x="112" y="252" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#dbeafe">• present LithePG.app.zip must include regular-file Info.plist and LithePGApp entries</text>
  <text x="112" y="282" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#dbeafe">• symlink/non-regular entries now report: Release artifact bundle file types: invalid</text>

  <rect x="80" y="344" width="1120" height="182" rx="16" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="112" y="386" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" fill="#bbf7d0">Verification</text>
  <text x="112" y="424" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#dcfce7">$ bash script/test_v10_release_gate.sh</text>
  <text x="112" y="454" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#86efac">test_v10_release_gate passed</text>
  <text x="112" y="484" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#dcfce7">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh &amp;&amp; git diff --check</text>
  <text x="112" y="514" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#86efac">passed with no output</text>

  <rect x="80" y="554" width="1120" height="82" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="112" y="594" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#c7d2fe">Review gates: spec compliance PASS; quality APPROVED</text>
  <text x="112" y="622" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#a5b4fc">No signing, notarization, upload, Homebrew publication, tag, cron change, or external publication attempted.</text>
</svg>
