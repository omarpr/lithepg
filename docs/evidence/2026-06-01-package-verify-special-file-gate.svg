<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier special-file gate evidence</title>
  <desc id="desc">Visual evidence for the v1.0 package verifier hardening that rejects FIFO and other special files inside LithePG.app bundles.</desc>
  <rect width="980" height="500" fill="#0b1020"/>
  <rect x="32" y="30" width="916" height="440" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="64" y="78" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="26" font-weight="700">LithePG v1.0 package verifier gate</text>
  <text x="64" y="116" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">2026-06-01 — reject bundle special files</text>

  <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="72" y="166" fill="#fca5a5">RED</text>
    <text x="150" y="166" fill="#e5e7eb">FIFO fixture initially passed package verification unexpectedly</text>
    <text x="72" y="216" fill="#86efac">GREEN</text>
    <text x="150" y="216" fill="#e5e7eb">package_verify.sh now fails closed on non-file/non-directory entries</text>
    <text x="72" y="266" fill="#c4b5fd">REVIEW</text>
    <text x="150" y="266" fill="#e5e7eb">Spec compliance PASS; code quality/security APPROVED</text>
    <text x="72" y="316" fill="#fcd34d">VERIFY</text>
    <text x="150" y="316" fill="#e5e7eb">package/create-zip/sign-notarize/v10 release helper tests passed</text>
  </g>

  <rect x="64" y="354" width="852" height="74" rx="10" fill="#020617" stroke="#1f2937"/>
  <text x="88" y="386" fill="#a7f3d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">New redacted failure:</text>
  <text x="88" y="414" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">package verification failed: app bundle must contain only regular files and directories</text>
</svg>
