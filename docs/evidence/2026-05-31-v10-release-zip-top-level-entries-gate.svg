  <rect x="64" y="152" width="992" height="392" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="88" y="192" fill="#79c0ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ bash script/test_v10_release_gate.sh</text>
