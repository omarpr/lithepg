<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 Homebrew cask zap stanza gate evidence</title>
  <desc id="desc">Visual evidence that the fast release preflight now validates the Homebrew cask zap stanza and that focused shell verification passed.</desc>
  <rect width="1180" height="680" fill="#0b1020"/>
  <rect x="40" y="36" width="1100" height="608" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="72" y="86" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 release preflight</text>
  <text x="72" y="122" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">Homebrew cask zap stanza gate — 2026-05-30</text>

  <rect x="72" y="156" width="1036" height="106" rx="14" fill="#0f172a" stroke="#1e293b"/>
  <text x="96" y="194" fill="#f8fafc" font-family="Menlo, Consolas, monospace" font-size="20" font-weight="700">Required cleanup paths</text>
  <text x="96" y="226" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">✓ ~/Library/Application Support/LithePG</text>
  <text x="96" y="250" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">✓ ~/Library/Preferences/dev.omarpr.lithepg.plist</text>

  <rect x="72" y="294" width="1036" height="214" rx="14" fill="#020617" stroke="#1e293b"/>
  <text x="96" y="330" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="19">$ bash script/test_v10_release_gate.sh</text>
  <text x="96" y="362" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="18">test_v10_release_gate passed</text>
  <text x="96" y="406" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="19">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh</text>
  <text x="96" y="438" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="18">passed with no output</text>
  <text x="96" y="482" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="19">$ git diff --check</text>
  <text x="96" y="514" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="18">passed with no whitespace errors</text>

  <rect x="72" y="540" width="320" height="58" rx="12" fill="#064e3b" stroke="#10b981"/>
  <text x="98" y="577" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">SPEC REVIEW: PASS</text>
  <rect x="420" y="540" width="370" height="58" rx="12" fill="#064e3b" stroke="#10b981"/>
  <text x="446" y="577" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">QUALITY REVIEW: APPROVED</text>
  <rect x="818" y="540" width="290" height="58" rx="12" fill="#1e3a8a" stroke="#60a5fa"/>
  <text x="844" y="577" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">NO PUBLICATION</text>
</svg>
