  <text x="70" y="130" fill="#8b949e" font-family="Menlo, Consolas, monospace" font-size="18">2026-05-31 10:43 EDT • test-only coverage receipt</text>

  <rect x="70" y="165" width="1060" height="120" rx="12" fill="#0d1117" stroke="#238636" stroke-width="2"/>
  <text x="95" y="202" fill="#3fb950" font-family="Menlo, Consolas, monospace" font-size="20" font-weight="700">Scenario covered</text>
  <text x="95" y="236" fill="#c9d1d9" font-family="Menlo, Consolas, monospace" font-size="17">LITHEPG_RELEASE_ZIP_OVERWRITE=approved with dist/LithePG.app.zip as a non-dangling symlink</text>
  <text x="95" y="263" fill="#c9d1d9" font-family="Menlo, Consolas, monospace" font-size="17">Expected: replace the symlink path with a regular zip; preserve the original target file unchanged.</text>

