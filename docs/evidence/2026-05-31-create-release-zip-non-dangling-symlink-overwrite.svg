<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">LithePG release zip non-dangling symlink overwrite evidence</title>
  <desc id="desc">Visual receipt for the 2026-05-31 create_release_zip approved non-dangling symlink overwrite coverage slice.</desc>
  <rect width="1200" height="680" fill="#0d1117"/>
  <rect x="40" y="40" width="1120" height="600" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
