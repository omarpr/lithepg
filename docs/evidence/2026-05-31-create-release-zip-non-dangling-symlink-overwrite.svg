  <text x="95" y="388" fill="#c9d1d9" font-family="Menlo, Consolas, monospace" font-size="17">$ bash script/test_create_release_zip.sh</text>
  <text x="115" y="416" fill="#3fb950" font-family="Menlo, Consolas, monospace" font-size="17">test_create_release_zip passed</text>
  <text x="95" y="452" fill="#c9d1d9" font-family="Menlo, Consolas, monospace" font-size="17">$ bash -n script/create_release_zip.sh script/test_create_release_zip.sh</text>
  <text x="115" y="480" fill="#3fb950" font-family="Menlo, Consolas, monospace" font-size="17">passed</text>

  <rect x="70" y="525" width="1060" height="70" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <text x="95" y="568" fill="#f0f6fc" font-family="Menlo, Consolas, monospace" font-size="17">git diff --check: passed • No signing, notarization, upload, tag, cron, or external publication.</text>
