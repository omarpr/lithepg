<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release zip Info.plist metadata gate evidence</title>
  <desc id="desc">Visual evidence artifact for the 2026-05-31 v1.0 release gate slice showing TDD checks and verification output.</desc>
  <rect width="1200" height="720" fill="#0b1020"/>
  <rect x="32" y="32" width="1136" height="656" rx="22" fill="#111827" stroke="#334155" stroke-width="2"/>
  <circle cx="68" cy="68" r="9" fill="#f87171"/>
  <circle cx="98" cy="68" r="9" fill="#fbbf24"/>
  <circle cx="128" cy="68" r="9" fill="#34d399"/>
  <text x="160" y="75" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">docs/evidence/2026-05-31-v10-release-zip-info-plist-metadata-gate.svg</text>

  <text x="64" y="126" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="700">LithePG v1.0 fast release preflight hardening</text>
  <text x="64" y="166" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Slice: block public LithePG.app.zip artifacts with invalid Info.plist metadata</text>

  <rect x="64" y="200" width="1072" height="128" rx="14" fill="#1f2937" stroke="#475569"/>
  <text x="88" y="234" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">RED checks observed</text>
  <text x="88" y="266" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">bash script/test_v10_release_gate.sh</text>
  <text x="88" y="294" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">↳ failed before implementation: expected Info.plist metadata mismatch gate</text>
  <text x="88" y="318" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">↳ failed regression before fix: expected “could not inspect” for malformed plist</text>

  <rect x="64" y="352" width="1072" height="150" rx="14" fill="#10251c" stroke="#166534"/>
  <text x="88" y="386" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">GREEN verification</text>
  <text x="88" y="418" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ bash script/test_v10_release_gate.sh</text>
  <text x="88" y="446" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">test_v10_release_gate passed</text>
  <text x="88" y="474" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh &amp;&amp; git diff --check</text>
  <text x="88" y="498" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">passed with no output</text>

  <rect x="64" y="526" width="1072" height="92" rx="14" fill="#172554" stroke="#2563eb"/>
  <text x="88" y="560" fill="#bfdbfe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700">Release-gate behavior added</text>
  <text x="88" y="592" fill="#dbeafe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Requires CFBundleExecutable, CFBundleIdentifier, CFBundleName, CFBundlePackageType, and version match.</text>
  <text x="88" y="616" fill="#dbeafe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Output stays redacted: matches / mismatch / could not inspect. No SHA, plist, or archive contents printed.</text>

  <text x="64" y="656" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">Generated by Boris during local cron output only. No signing, notarization, upload, Homebrew publication, tag, or cron changes were attempted.</text>
</svg>
