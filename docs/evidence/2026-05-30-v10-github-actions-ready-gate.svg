  <circle cx="66" cy="66" r="10" fill="#ef4444"/>
  <circle cx="98" cy="66" r="10" fill="#f59e0b"/>
  <circle cx="130" cy="66" r="10" fill="#22c55e"/>
  <text x="160" y="73" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">/Users/omar/projects/lithepg — v1.0 preflight hardening</text>
  <text x="58" y="124" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ bash script/test_v10_release_gate.sh</text>
