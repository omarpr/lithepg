  <text x="58" y="234" fill="#d1fae5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">bash -n passed</text>
  <text x="58" y="284" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ ./script/v10_release_gate.sh --check-remote</text>
  <text x="58" y="314" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">LithePG v1.0 fast publication preflight</text>
