<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier app bundle basename gate evidence</title>
  <desc id="desc">Visual receipt showing the v1.0 package verifier now rejects non-canonical app bundle basenames and that release-helper tests passed.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="36" y="36" width="1128" height="688" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="72" y="96" fill="#e5e7eb" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="38" font-weight="700">v1.0 package verifier hardening</text>
  <text x="72" y="140" fill="#93c5fd" font-family="SF Mono, Menlo, monospace" font-size="22">2026-05-31 20:50 EDT · script/package_verify.sh</text>

  <rect x="72" y="182" width="1056" height="136" rx="18" fill="#1f2937" stroke="#f97316" stroke-width="2"/>
  <text x="104" y="228" fill="#fed7aa" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">RED</text>
  <text x="104" y="268" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">bash script/test_package_verify.sh</text>
  <text x="104" y="298" fill="#fdba74" font-family="SF Mono, Menlo, monospace" font-size="18">test_package_verify failed: package verifier unexpectedly accepted an app bundle with the wrong basename</text>

  <rect x="72" y="350" width="1056" height="170" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="104" y="396" fill="#86efac" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">GREEN</text>
  <text x="104" y="436" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">bash script/test_package_verify.sh</text>
  <text x="104" y="466" fill="#bbf7d0" font-family="SF Mono, Menlo, monospace" font-size="18">test_package_verify passed</text>
  <text x="104" y="496" fill="#bbf7d0" font-family="SF Mono, Menlo, monospace" font-size="18">bash -n package/test scripts · git diff --check · adjacent release helper tests · swift build: passed</text>

  <rect x="72" y="552" width="1056" height="112" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="104" y="598" fill="#bfdbfe" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Gate added</text>
  <text x="104" y="638" fill="#f9fafb" font-family="SF Mono, Menlo, monospace" font-size="20">APP_BUNDLE basename must be exactly LithePG.app before package verification can succeed.</text>
</svg>
