<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 signing/notarization notary zip parent-directory gate</title>
  <desc id="desc">Visual evidence for a release-wrapper hardening commit: missing or non-writable notary zip parent directories are rejected before dry-run or signing can claim success.</desc>
  <rect width="1180" height="640" fill="#0b1020"/>
  <rect x="36" y="32" width="1108" height="576" rx="20" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="72" y="86" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">v1.0 release wrapper hardening</text>
  <text x="72" y="124" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">script/sign_and_notarize.sh — notary ZIP parent gate</text>

  <rect x="72" y="158" width="492" height="318" rx="14" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="200" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700">RED</text>
  <text x="100" y="238" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash script/test_sign_and_notarize.sh</text>
  <text x="100" y="282" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">failed first:</text>
  <text x="100" y="316" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">dry run unexpectedly passed with</text>
  <text x="100" y="342" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">missing notary zip parent directory</text>
  <text x="100" y="394" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">Proved the wrapper could claim OK</text>
  <text x="100" y="420" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">for an output path that cannot be written.</text>

  <rect x="616" y="158" width="492" height="318" rx="14" fill="#1f2937" stroke="#22c55e" stroke-width="2"/>
  <text x="644" y="200" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700">GREEN</text>
  <text x="644" y="238" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash script/test_sign_and_notarize.sh</text>
  <text x="644" y="282" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">test_sign_and_notarize passed</text>
  <text x="644" y="326" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash -n script/sign_and_notarize.sh</text>
  <text x="644" y="352" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash -n script/test_sign_and_notarize.sh</text>
  <text x="644" y="396" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">syntax OK · git diff --check OK</text>
  <text x="644" y="436" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">New failures: missing/non-writable notary</text>
  <text x="644" y="462" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15">zip parent; no signing/notary values leak.</text>

  <rect x="72" y="506" width="1036" height="64" rx="12" fill="#0f172a" stroke="#475569"/>
  <text x="100" y="544" fill="#f8fafc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Independent reviews: spec PASS · quality/security APPROVED · no signing, notarization, upload, tag, cron, or external publication.</text>
</svg>
