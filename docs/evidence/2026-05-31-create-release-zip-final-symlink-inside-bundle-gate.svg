<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 create_release_zip final symlink inside-bundle gate evidence</title>
  <desc id="desc">Visual release-hardening receipt showing the RED failure and GREEN verification for rejecting a final public release zip symlink physically inside LithePG.app even when it points outside.</desc>
  <rect width="1280" height="720" fill="#101820"/>
  <rect x="42" y="40" width="1196" height="640" rx="24" fill="#17212f" stroke="#5fd3bc" stroke-width="3"/>
  <text x="72" y="92" fill="#5fd3bc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">LithePG v1.0 release helper hardening</text>
  <text x="72" y="132" fill="#d7e3f4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Slice: create_release_zip final symlink inside-bundle gate</text>

  <rect x="72" y="165" width="1136" height="135" rx="14" fill="#241820" stroke="#ff6b6b" stroke-width="2"/>
  <text x="96" y="202" fill="#ffb4b4" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">RED — regression proves the bypass</text>
  <text x="96" y="236" fill="#f6d6d6" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_create_release_zip.sh</text>
  <text x="96" y="264" fill="#f6d6d6" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">failed first: helper unexpectedly allowed a final output symlink inside the app bundle pointing outside</text>

  <rect x="72" y="325" width="1136" height="170" rx="14" fill="#14291f" stroke="#65d97b" stroke-width="2"/>
  <text x="96" y="362" fill="#aef3ba" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">GREEN — gate and adjacent helpers pass</text>
  <text x="96" y="396" fill="#d9ffe0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_create_release_zip.sh → test_create_release_zip passed</text>
  <text x="96" y="424" fill="#d9ffe0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash -n script/create_release_zip.sh script/test_create_release_zip.sh → passed</text>
  <text x="96" y="452" fill="#d9ffe0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_sign_and_notarize.sh → test_sign_and_notarize passed</text>
  <text x="96" y="480" fill="#d9ffe0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">bash script/test_v10_release_gate.sh + git diff --check → passed</text>

  <rect x="72" y="520" width="1136" height="110" rx="14" fill="#121a27" stroke="#8ab4f8" stroke-width="2"/>
  <text x="96" y="557" fill="#bcd2ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Independent review</text>
  <text x="96" y="591" fill="#e3ebff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Spec compliance: PASS</text>
  <text x="96" y="619" fill="#e3ebff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Code quality/security: APPROVED</text>

  <text x="72" y="663" fill="#95a5bd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="14">No signing, notarization, upload, Homebrew publication, GitHub Release, tag, cron, or external publication was attempted.</text>
</svg>
