<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app-icon PNG sRGB gate evidence</title>
  <desc id="desc">Evidence summary for the release gate hardening that rejects malformed PNG sRGB chunks in AppIcon.icns.</desc>
  <rect width="1280" height="720" fill="#0b1020"/>
  <rect x="36" y="36" width="1208" height="648" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="72" y="102" fill="#e5f2ff" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="700">LithePG release gate evidence</text>
  <text x="72" y="148" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="22">2026-06-23 21:10 EDT — AppIcon.icns PNG sRGB validation</text>

  <rect x="72" y="190" width="1136" height="116" rx="16" fill="#1f2937" stroke="#475569"/>
  <text x="100" y="230" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">RED</text>
  <text x="170" y="230" fill="#fee2e2" font-family="Menlo, Consolas, monospace" font-size="18">bash script/test_package_verify.sh</text>
  <text x="170" y="260" fill="#fee2e2" font-family="Menlo, Consolas, monospace" font-size="18">failed: accepted AppIcon.icns with invalid PNG sRGB chunk</text>
  <text x="170" y="290" fill="#fee2e2" font-family="Menlo, Consolas, monospace" font-size="18">bash script/test_v10_release_gate.sh failed on matching artifact-only fixture</text>

  <rect x="72" y="330" width="1136" height="160" rx="16" fill="#10251b" stroke="#22c55e"/>
  <text x="100" y="370" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">GREEN</text>
  <text x="190" y="370" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="18">bash -n package/release helper scripts</text>
  <text x="190" y="400" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="18">test_package_verify, test_v10_release_gate, sign/notarize, create_zip, build_and_run: passed</text>
  <text x="190" y="430" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="18">swift build: passed · swift test: 127 tests / 20 suites passed</text>
  <text x="190" y="460" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="18">package_verify + artifact-only preflight on dist/LithePG.app.zip: clear</text>

  <rect x="72" y="520" width="1136" height="98" rx="16" fill="#172554" stroke="#60a5fa"/>
  <text x="100" y="560" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="21" font-weight="700">Scope</text>
  <text x="190" y="560" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="18">Release helper hardening only; no signing identity, notarization, GitHub Release, tag,</text>
  <text x="190" y="590" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="18">Homebrew publication, cron change, Telegram delivery, or external publication attempted.</text>

  <text x="72" y="658" fill="#94a3b8" font-family="Menlo, Consolas, monospace" font-size="16">screenshots/evidence/2026-06-23-app-icon-png-srgb-gate.svg</text>
