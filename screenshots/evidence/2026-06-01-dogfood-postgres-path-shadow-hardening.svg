<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG dogfood Postgres PATH-shadow hardening evidence</title>
  <desc id="desc">Evidence card showing dogfood_postgres now avoids PATH-shadowed dirname, grep, and sleep while keeping docker PATH-resolved for fake Docker tests.</desc>
  <rect width="1280" height="720" fill="#0f172a"/>
  <rect x="48" y="48" width="1184" height="624" rx="28" fill="#111827" stroke="#34d399" stroke-width="3"/>
  <text x="88" y="118" fill="#ecfdf5" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="700">LithePG dogfood_postgres hardening</text>
  <text x="88" y="168" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="22">2026-06-01 — helper-owned core utility PATH-shadow regression</text>

  <rect x="88" y="214" width="1104" height="126" rx="18" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="116" y="260" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="23">Changed helper-owned utilities:</text>
  <text x="116" y="300" fill="#a7f3d0" font-family="Menlo, Consolas, monospace" font-size="21">dirname/grep/sleep now use /usr/bin or /bin absolute paths</text>

  <rect x="88" y="372" width="528" height="190" rx="18" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2"/>
  <text x="116" y="416" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">Strict TDD</text>
  <text x="116" y="458" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="20">RED: fake PATH-shadow dirname/grep failed first</text>
  <text x="116" y="494" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="20">GREEN: test_dogfood_postgres passed</text>
  <text x="116" y="530" fill="#bfdbfe" font-family="Menlo, Consolas, monospace" font-size="20">Fake Docker exercised; no real Docker required</text>

  <rect x="664" y="372" width="528" height="190" rx="18" fill="#312e81" stroke="#818cf8" stroke-width="2"/>
  <text x="692" y="416" fill="#eef2ff" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700">Safety notes</text>
  <text x="692" y="458" fill="#c7d2fe" font-family="Menlo, Consolas, monospace" font-size="20">docker remains intentionally PATH-resolved</text>
  <text x="692" y="494" fill="#c7d2fe" font-family="Menlo, Consolas, monospace" font-size="20">Demo URL assertion keeps postgres:*** redacted</text>
  <text x="692" y="530" fill="#c7d2fe" font-family="Menlo, Consolas, monospace" font-size="20">No signing/upload/tag/push/cron changes</text>

  <text x="88" y="618" fill="#94a3b8" font-family="Menlo, Consolas, monospace" font-size="18">Evidence artifact: screenshots/evidence/2026-06-01-dogfood-postgres-path-shadow-hardening.svg</text>
</svg>
