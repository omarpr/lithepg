  <text x="104" y="538" class="small">✓ git diff --check</text>
  <text x="104" y="568" class="small">✓ swift build &amp;&amp; swift test — 127 tests / 20 suites</text>

  <rect x="656" y="400" width="504" height="194" rx="18" fill="#111c30" stroke="#273548"/>
  <text x="684" y="438" class="card-title">Dogfood check · .build/dogfood-checks/20260602-114721</text>
