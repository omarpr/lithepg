  <circle cx="696" cy="277" r="7" class="ok"/><text x="716" y="283" class="value">GREEN: script/test_v04_measure.sh passed</text>
  <circle cx="696" cy="319" r="7" class="ok"/><text x="716" y="325" class="value">Generic output; no sentinel/work/output leak</text>

