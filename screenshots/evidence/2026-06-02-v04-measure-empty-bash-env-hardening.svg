<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v0.4 measurement helper empty BASH_ENV hardening evidence</title>
  <desc id="desc">Visual evidence for the commit hardening script/v04_measure.sh against empty but present BASH_ENV after sanitizer-marked reentry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#182135"/>
    </linearGradient>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .card-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
      .value { font: 600 17px Menlo, Monaco, Consolas, monospace; fill: #f8fafc; }
      .ok { fill: #34d399; }
      .warn { fill: #fbbf24; }
      .muted { fill: #94a3b8; }
      .small { font: 500 13px Menlo, Monaco, Consolas, monospace; fill: #cbd5e1; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="36" width="1200" height="648" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <text x="76" y="92" class="title">v04_measure empty BASH_ENV fail-closed hardening</text>
  <text x="76" y="122" class="subtitle">2026-06-02 11:47 EDT · LithePG main · no credentials, signing, release upload, tag, or cron changes</text>

  <rect x="76" y="158" width="548" height="210" rx="18" fill="#111c30" stroke="#273548"/>
