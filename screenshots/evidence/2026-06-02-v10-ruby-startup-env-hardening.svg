<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release gate Ruby startup-env hardening evidence</title>
  <desc id="desc">Visual evidence for the 2026-06-02 v10_release_gate Ruby startup environment hardening commit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: rgba(15, 23, 42, 0.84); stroke: #38bdf8; stroke-width: 1.2; }
      .ok { fill: #22c55e; }
      .warn { fill: #f59e0b; }
      .muted { fill: #94a3b8; }
      .text { fill: #e5e7eb; }
      .cyan { fill: #67e8f9; }
      .red { fill: #fb7185; }
    </style>
  </defs>
  <rect width="1180" height="760" fill="url(#bg)"/>
  <rect x="36" y="34" width="1108" height="692" rx="18" class="panel"/>

  <text x="66" y="82" class="sans text" font-size="30" font-weight="700">LithePG v1.0 release gate hardening</text>
  <text x="66" y="114" class="sans muted" font-size="16">2026-06-02 14:17 EDT · script/v10_release_gate.sh · Ruby startup env fail-closed</text>

  <rect x="66" y="146" width="520" height="168" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="181" class="sans cyan" font-size="18" font-weight="700">Changed behavior</text>
  <text x="90" y="214" class="mono text" font-size="15">• RUBYOPT / RUBYLIB / RUBYGEMS_GEMDEPS =&gt; dirty env</text>
  <text x="90" y="242" class="mono text" font-size="15">• Sanitizer re-exec deletes all three keys</text>
  <text x="90" y="270" class="mono text" font-size="15">• Reentry with any key present exits 2</text>
  <text x="90" y="298" class="mono text" font-size="15">• ruby -c runs with env scrub + startup/gems disabled</text>

  <rect x="614" y="146" width="500" height="168" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="638" y="181" class="sans cyan" font-size="18" font-weight="700">TDD receipt</text>
  <circle cx="650" cy="215" r="7" class="red"/>
  <text x="668" y="220" class="mono text" font-size="15">RED: sanitizer did not fail closed for RUBYOPT</text>
  <circle cx="650" cy="247" r="7" class="red"/>
  <text x="668" y="252" class="mono text" font-size="15">RED: sanitizer did not fail closed for RUBYGEMS_GEMDEPS</text>
  <circle cx="650" cy="279" r="7" class="ok"/>
  <text x="668" y="284" class="mono text" font-size="15">GREEN: bash script/test_v10_release_gate.sh passed</text>

  <rect x="66" y="342" width="1048" height="276" rx="12" fill="#020617" stroke="#334155"/>
  <text x="90" y="378" class="sans cyan" font-size="18" font-weight="700">Verification</text>
  <text x="90" y="414" class="mono ok" font-size="16">✓ bash script/test_v10_release_gate.sh</text>
  <text x="90" y="444" class="mono ok" font-size="16">✓ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh</text>
  <text x="90" y="474" class="mono ok" font-size="16">✓ git diff --check</text>
  <text x="90" y="504" class="mono ok" font-size="16">✓ DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift build</text>
  <text x="90" y="534" class="mono ok" font-size="16">✓ DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift test · 127 tests / 20 suites</text>
  <text x="90" y="564" class="mono ok" font-size="16">✓ ./script/dogfood_check.sh · artifacts .build/dogfood-checks/20260602-141646/</text>
  <text x="90" y="594" class="mono warn" font-size="16">• ./script/v10_release_gate.sh --check-remote remained blocked on expected external gates</text>

  <rect x="66" y="646" width="1048" height="70" rx="12" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="676" class="sans cyan" font-size="18" font-weight="700">Dogfood metrics</text>
  <text x="90" y="703" class="mono text" font-size="15">shell 134.11 ms · connected 248.31 ms · raw 21.379 MiB · strip 11.980 MiB · SELECT 1 overhead 0.065 ms · dogfood overhead 0.051 ms</text>
