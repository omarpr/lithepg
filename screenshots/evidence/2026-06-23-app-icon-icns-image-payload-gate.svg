<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 ICNS image payload gate evidence</title>
  <desc id="desc">Visual evidence for the release-helper slice that requires AppIcon.icns to contain a recognized ICNS image element with non-empty payload data.</desc>
  <rect width="1280" height="760" fill="#0b1020"/>
  <rect x="40" y="40" width="1200" height="680" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="80" y="105" fill="#e5f3ff" font-family="SF Mono, Menlo, Consolas, monospace" font-size="30" font-weight="700">LithePG v1.0 release gate: AppIcon.icns image payload validation</text>
  <text x="80" y="152" fill="#93c5fd" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">2026-06-23 04:59 EDT · local cron evidence · no external publication attempted</text>

  <rect x="80" y="190" width="1120" height="150" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="232" fill="#bfdbfe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">What changed</text>
  <text x="110" y="270" fill="#dbeafe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">package_verify.sh and v10_release_gate.sh now reject syntactically-valid ICNS files</text>
  <text x="110" y="300" fill="#dbeafe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">that have no recognized icon image element with payload bytes.</text>

  <rect x="80" y="370" width="540" height="220" rx="18" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="412" fill="#bbf7d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">TDD receipt</text>
  <text x="110" y="450" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">RED: test_package_verify rejected missing coverage</text>
  <text x="110" y="480" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">RED: test_v10_release_gate accepted empty icon</text>
  <text x="110" y="520" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">GREEN: package/v10/sign helper tests passed</text>
  <text x="110" y="550" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">GREEN: swift build + swift test passed</text>

  <rect x="660" y="370" width="540" height="220" rx="18" fill="#312e81" stroke="#a78bfa" stroke-width="2"/>
  <text x="690" y="412" fill="#ddd6fe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">Release artifact checks</text>
  <text x="690" y="450" fill="#ede9fe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">./script/package_verify.sh dist/LithePG.app</text>
  <text x="690" y="480" fill="#ede9fe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">LITHEPG_RELEASE_ZIP_SHA256=&lt;computed&gt;</text>
  <text x="690" y="510" fill="#ede9fe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">  ./script/v10_release_gate.sh --artifact-only</text>
  <text x="690" y="550" fill="#ede9fe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">Result: artifact-only preflight is clear</text>

  <rect x="80" y="625" width="1120" height="58" rx="14" fill="#3b1d0b" stroke="#fb923c" stroke-width="2"/>
  <text x="110" y="662" fill="#fed7aa" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">Dogfood gate attempted; blocked locally because Docker is unavailable in this cron environment.</text>
</svg>
