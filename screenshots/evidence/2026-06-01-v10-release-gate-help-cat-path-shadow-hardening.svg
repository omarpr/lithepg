<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 release gate help PATH-shadow hardening evidence</title>
  <desc id="desc">Synthetic terminal-style receipt showing the v1.0 release gate help text avoids PATH-shadowed cat and passes focused verification.</desc>
  <rect width="1200" height="675" fill="#111827"/>
  <rect x="48" y="48" width="1104" height="579" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="82" y="105" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">v1.0 release gate help PATH-shadow hardening</text>
  <text x="82" y="158" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">RED: bash script/test_v10_release_gate.sh</text>
  <text x="116" y="198" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">failed: --help did not exit 0 under PATH-shadowed cat</text>
  <text x="82" y="258" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Change:</text>
  <text x="116" y="298" fill="#bfdbfe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">script/v10_release_gate.sh usage() now renders via /bin/cat</text>
  <text x="82" y="358" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22">GREEN:</text>
  <text x="116" y="398" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">bash script/test_v10_release_gate.sh → passed</text>
  <text x="116" y="438" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">adjacent release-helper shell tests → passed</text>
  <text x="116" y="478" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">bash -n / git diff --check / swift build+test → passed</text>
  <text x="82" y="548" fill="#fbbf24" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20">No signing, notarization, upload, Homebrew publication, tag, or cron changes.</text>
  <text x="82" y="588" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">Synthetic, secret-free visual artifact for commit evidence.</text>
</svg>
