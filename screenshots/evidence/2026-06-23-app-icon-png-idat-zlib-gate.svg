<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app-icon PNG IDAT zlib gate evidence</title>
  <desc id="desc">Evidence summary for the v1.0 release-helper hardening that rejects high-resolution PNG-backed ICNS icons whose IDAT chunks are not a valid zlib stream.</desc>
  <rect width="1280" height="760" fill="#0b1020"/>
  <rect x="40" y="40" width="1200" height="680" rx="24" fill="#111827" stroke="#60a5fa" stroke-width="3"/>
  <text x="72" y="96" fill="#dbeafe" font-family="Menlo, Consolas, monospace" font-size="30" font-weight="700">LithePG release-helper hardening</text>
  <text x="72" y="136" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="20">2026-06-23 08:48 EDT — app-icon PNG IDAT zlib gate</text>

  <rect x="72" y="170" width="1136" height="210" rx="14" fill="#020617" stroke="#334155"/>
  <text x="96" y="210" fill="#f8fafc" font-family="Menlo, Consolas, monospace" font-size="19">RED checks</text>
  <text x="96" y="244" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="17">test_package_verify failed first:</text>
  <text x="118" y="274" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="15">unexpectedly accepted AppIcon.icns whose high-resolution PNG IDAT stream is not valid zlib data</text>
  <text x="96" y="312" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="17">test_v10_release_gate failed first:</text>
  <text x="118" y="342" fill="#fecaca" font-family="Menlo, Consolas, monospace" font-size="15">artifact-only gate unexpectedly passed with malformed release artifact app icon</text>

  <rect x="72" y="404" width="1136" height="210" rx="14" fill="#052e16" stroke="#22c55e"/>
  <text x="96" y="444" fill="#dcfce7" font-family="Menlo, Consolas, monospace" font-size="19">GREEN verification</text>
  <text x="96" y="478" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_package_verify.sh ✅</text>
  <text x="96" y="508" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_v10_release_gate.sh ✅</text>
  <text x="96" y="538" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">bash script/test_sign_and_notarize.sh / test_create_release_zip / test_build_and_run ✅</text>
  <text x="96" y="568" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">swift build + swift test: 127 tests in 20 suites passed ✅</text>
  <text x="96" y="598" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="16">rebuilt v1.0 local package + artifact-only preflight clear; executable 11.96 MiB ✅</text>

  <rect x="72" y="638" width="1136" height="54" rx="12" fill="#1e1b4b" stroke="#818cf8"/>
  <text x="96" y="672" fill="#c7d2fe" font-family="Menlo, Consolas, monospace" font-size="16">No signing identity, notarization, upload, GitHub Release, Homebrew publication, tag, cron change, or Telegram delivery attempted.</text>
</svg>
