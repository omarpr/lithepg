<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app-icon PNG tRNS/PLTE ordering gate evidence</title>
  <desc id="desc">Evidence that the package verifier and v1.0 release artifact gate now reject PNG app icons where tRNS appears before PLTE.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#182235"/>
    </linearGradient>
    <style>
      .mono { font: 24px SFMono-Regular, Menlo, Consolas, monospace; fill: #dbeafe; }
      .small { font: 19px SFMono-Regular, Menlo, Consolas, monospace; fill: #cbd5e1; }
      .label { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .ok { fill: #86efac; }
      .fail { fill: #fca5a5; }
      .muted { fill: #94a3b8; }
      .box { fill: rgba(15, 23, 42, 0.82); stroke: #334155; stroke-width: 2; rx: 18; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="52" y="70" class="label">LithePG v1.0 release gate hardening</text>
  <text x="52" y="112" class="small muted">2026-06-23 19:33 EDT · PNG app-icon chunk ordering: reject tRNS before PLTE</text>

  <rect x="52" y="150" width="1096" height="170" class="box"/>
  <text x="82" y="195" class="label fail">RED checks captured</text>
  <text x="82" y="240" class="mono">bash script/test_package_verify.sh</text>
  <text x="82" y="276" class="small fail">failed: package verifier unexpectedly accepted PNG payload placing tRNS before PLTE</text>
  <text x="82" y="304" class="small fail">failed: artifact-only gate unexpectedly passed with PNG tRNS before PLTE</text>

  <rect x="52" y="350" width="1096" height="230" class="box"/>
  <text x="82" y="395" class="label ok">GREEN verification passed</text>
  <text x="82" y="440" class="mono">bash -n package/release helper scripts</text>
  <text x="82" y="476" class="mono">bash script/test_package_verify.sh  → passed</text>
  <text x="82" y="512" class="mono">bash script/test_v10_release_gate.sh → passed</text>
  <text x="82" y="548" class="mono">swift build && swift test → 127 tests / 20 suites passed</text>

  <rect x="52" y="610" width="1096" height="98" class="box"/>
  <text x="82" y="652" class="label ok">Local artifact still clears</text>
  <text x="82" y="690" class="small">dist/LithePG.app verifies; dist/LithePG.app.zip artifact-only preflight remains clear. No secrets, tags, publication, or cron changes.</text>
</svg>
