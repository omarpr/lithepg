<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 PNG unknown ancillary app-icon gate evidence</title>
  <desc id="desc">Visual evidence for the 2026-06-24 release hardening commit showing RED and GREEN verification for unknown ancillary PNG chunk rejection.</desc>
  <rect width="1180" height="720" fill="#0b1020"/>
  <rect x="40" y="36" width="1100" height="648" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="72" y="88" fill="#e5e7eb" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="27" font-weight="700">LithePG v1.0 release gate: unknown ancillary PNG chunk hardening</text>
  <text x="72" y="128" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">2026-06-24 06:13 EDT · seeded/local release verification · no secrets</text>

  <rect x="72" y="164" width="1036" height="130" rx="12" fill="#1e1b4b" stroke="#6366f1"/>
  <text x="96" y="204" fill="#c4b5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">RED — tests caught the missing fail-closed rule first</text>
  <text x="96" y="238" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">./script/test_package_verify.sh → failed: accepted unknown ancillary PNG chunk</text>
  <text x="96" y="266" fill="#fca5a5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">./script/test_v10_release_gate.sh → failed: artifact-only gate passed with unknown ancillary chunk</text>

  <rect x="72" y="324" width="1036" height="178" rx="12" fill="#052e16" stroke="#22c55e"/>
  <text x="96" y="364" fill="#86efac" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">GREEN — package + artifact gates now reject unrecognized PNG chunks</text>
  <text x="96" y="398" fill="#d1fae5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash -n package/release/test scripts → pass</text>
  <text x="96" y="426" fill="#d1fae5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">./script/test_package_verify.sh + ./script/test_v10_release_gate.sh → passed</text>
  <text x="96" y="454" fill="#d1fae5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">sign/notary, release-zip, build-and-run shell suites → passed</text>
  <text x="96" y="482" fill="#d1fae5" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">swift build + swift test → 127 tests across 20 suites passed</text>

  <rect x="72" y="532" width="1036" height="106" rx="12" fill="#1f2937" stroke="#475569"/>
  <text x="96" y="572" fill="#bfdbfe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Release posture</text>
  <text x="96" y="606" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Package verified: LithePG.app · dev.omarpr.lithepg · 1.0 (100)</text>
  <text x="96" y="632" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Docker unavailable in cron; dogfood_check.sh skipped. No signing/notary/upload/tag/release attempted.</text>
</svg>
