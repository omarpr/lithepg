<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG Persistence File Protection Cron Fix Evidence</title>
  <desc id="desc">Visual evidence for the commit that updates file protection options to allow background cron runs when the macOS device is locked.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="640" rx="18" fill="#111827" stroke="#10b981" stroke-width="3"/>
  <text x="72" y="92" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="30" font-weight="700">LithePG Cron/Background Test Fix</text>
  <text x="72" y="132" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="18">2026-06-14 17:35 EDT — Non-UI evidence artifact</text>

  <rect x="72" y="170" width="1056" height="150" rx="12" fill="#020617" stroke="#1f2937"/>
  <text x="96" y="205" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="20">Change Description</text>
  <text x="96" y="240" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="17">Updated JSONFileSavedConnectionStore and JSONFileQueryHistoryStore to use:</text>
  <text x="96" y="270" fill="#fde68a" font-family="Menlo, Consolas, monospace" font-size="17">.completeFileProtectionUntilFirstUserAuthentication</text>
  <text x="96" y="300" fill="#a1a1aa" font-family="Menlo, Consolas, monospace" font-size="15">Instead of .completeFileProtectionUnlessOpen, which blocks access in background/cron when screen is locked.</text>

  <rect x="72" y="350" width="1056" height="210" rx="12" fill="#020617" stroke="#1f2937"/>
  <text x="96" y="385" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="20">Verification Results</text>
  <text x="96" y="420" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="17">✓ DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift test</text>
  <text x="96" y="450" fill="#34d399" font-family="Menlo, Consolas, monospace" font-size="17">✓ Test Suite 'All tests' passed: 127 tests across 20 suites with 0 failures!</text>
  <text x="96" y="480" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="17">✓ Persistence model tests (query-history.json and saved-connections.json) run perfectly.</text>
  <text x="96" y="510" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="17">✓ Security scans and independent reviewer approved.</text>

  <rect x="72" y="590" width="1056" height="65" rx="12" fill="#022c22" stroke="#10b981"/>
  <text x="96" y="630" fill="#d1fae5" font-family="Menlo, Consolas, monospace" font-size="18">Verdict: Spec PASS, Quality APPROVED, Independent JSON Reviewer Approved.</text>
</svg>
