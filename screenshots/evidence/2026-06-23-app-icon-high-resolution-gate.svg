  <text x="632" y="392" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#e0e7ff">bash -n touched release helpers: PASS</text>
  <text x="632" y="418" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#e0e7ff">git diff --check: PASS</text>
  <text x="632" y="444" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#e0e7ff">swift build: PASS</text>
