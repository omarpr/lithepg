  <text x="68" y="88" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="700" fill="#e5f3ff">LithePG v1.0 Release Gate Evidence</text>
  <text x="68" y="126" font-family="SF Mono, Menlo, monospace" font-size="17" fill="#93c5fd">2026-06-23 05:28 EDT · app-icon high-resolution ICNS validation</text>

  <rect x="68" y="158" width="1044" height="132" rx="14" fill="#0b1220" stroke="#1e40af"/>
  <text x="92" y="196" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="650" fill="#bfdbfe">What changed</text>
  <text x="92" y="230" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#d1d5db">script/package_verify.sh and script/v10_release_gate.sh now reject AppIcon.icns files</text>
  <text x="92" y="256" font-family="SF Mono, Menlo, monospace" font-size="16" fill="#d1d5db">that contain only low-resolution image payloads. A public artifact must include ic10 or ic14.</text>

  <rect x="68" y="318" width="504" height="242" rx="14" fill="#052e16" stroke="#22c55e"/>
  <text x="92" y="356" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="650" fill="#bbf7d0">TDD receipts</text>
  <text x="92" y="392" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#dcfce7">RED: test_package_verify rejected old behavior:</text>
  <text x="116" y="418" font-family="SF Mono, Menlo, monospace" font-size="14" fill="#86efac">accepted AppIcon.icns without high-resolution image</text>
  <text x="92" y="456" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#dcfce7">RED: test_v10_release_gate rejected old behavior:</text>
  <text x="116" y="482" font-family="SF Mono, Menlo, monospace" font-size="14" fill="#86efac">artifact-only gate accepted malformed app icon</text>
  <text x="92" y="522" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#dcfce7">GREEN: package/v10/sign/create/build helper tests passed</text>

  <rect x="608" y="318" width="504" height="242" rx="14" fill="#1e1b4b" stroke="#818cf8"/>
