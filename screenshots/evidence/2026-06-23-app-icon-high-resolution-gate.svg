  <title id="title">LithePG v1.0 app icon high-resolution gate evidence</title>
  <desc id="desc">Evidence summary for the release-helper slice requiring high-resolution ICNS image elements.</desc>
  <rect width="1180" height="720" rx="28" fill="#0f172a"/>
