  <text x="66" y="114" class="sans muted" font-size="16">2026-06-02 14:35 EDT · docs-only receipt refresh · no public release action</text>

  <rect x="66" y="146" width="1048" height="130" rx="12" class="box"/>
  <text x="90" y="181" class="sans cyan" font-size="18" font-weight="700">Source receipt</text>
  <text x="90" y="214" class="mono text" font-size="16">.build/dogfood-checks/20260602-141646/status.json</text>
  <text x="90" y="244" class="mono text" font-size="16">branch main · commit d4f402a · defaultSwiftTest/liveSwiftTest/v04Measure all passed</text>

