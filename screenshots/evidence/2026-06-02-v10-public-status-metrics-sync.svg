<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 public status metrics sync evidence</title>
  <desc id="desc">Visual evidence for syncing README, CHANGELOG, and v1.0 draft release metrics from the 2026-06-02 local dogfood receipt.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .panel { fill: rgba(15, 23, 42, 0.86); stroke: #22d3ee; stroke-width: 1.2; }
      .box { fill: #020617; stroke: #334155; }
      .ok { fill: #22c55e; }
      .warn { fill: #f59e0b; }
      .muted { fill: #94a3b8; }
      .text { fill: #e5e7eb; }
      .cyan { fill: #67e8f9; }
    </style>
  </defs>
  <rect width="1180" height="760" fill="url(#bg)"/>
  <rect x="36" y="34" width="1108" height="692" rx="18" class="panel"/>

