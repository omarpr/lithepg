  <text x="90" y="582" class="sans cyan" font-size="18" font-weight="700">Guardrails preserved</text>
  <text x="90" y="616" class="mono warn" font-size="16">• v1.0 remains blocked on signing/notary credentials, security contact, Homebrew tap, CI settings, and approval.</text>
  <text x="90" y="646" class="mono warn" font-size="16">• No signing, notarization, upload, GitHub Release, Homebrew publication, tag, cron change, or external publication.</text>

  <rect x="66" y="678" width="1048" height="38" rx="10" fill="#0f172a" stroke="#334155"/>
  <text x="90" y="703" class="mono text" font-size="15">Evidence artifact: screenshots/evidence/2026-06-02-v10-public-status-metrics-sync.svg</text>
