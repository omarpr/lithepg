<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app-icon PNG PLTE gate evidence</title>
  <desc id="desc">Visual release evidence showing RED and GREEN verification for rejecting indexed PNG app icons without a PLTE chunk.</desc>
  <rect width="1200" height="760" fill="#0f172a"/>
  <rect x="44" y="40" width="1112" height="680" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="82" y="104" fill="#e5f3ff" font-family="SF Mono, Menlo, Consolas, monospace" font-size="32" font-weight="700">LithePG release gate: indexed PNG app icons require PLTE</text>
  <text x="82" y="150" fill="#93c5fd" font-family="SF Mono, Menlo, Consolas, monospace" font-size="20">2026-06-23 10:32 EDT · local cron output · no secrets</text>

  <rect x="82" y="190" width="1036" height="104" rx="16" fill="#2f1b1b" stroke="#f87171" stroke-width="2"/>
  <text x="110" y="228" fill="#fecaca" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">RED</text>
  <text x="110" y="264" fill="#fee2e2" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">test_package_verify failed: accepted indexed PNG payload with no PLTE chunk</text>
  <text x="110" y="288" fill="#fee2e2" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">test_v10_release_gate failed: artifact-only gate accepted malformed app icon</text>

  <rect x="82" y="322" width="1036" height="178" rx="16" fill="#10291f" stroke="#34d399" stroke-width="2"/>
  <text x="110" y="360" fill="#bbf7d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">GREEN</text>
  <text x="110" y="396" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">bash -n package_verify/test_package_verify/v10_release_gate/test_v10_release_gate</text>
  <text x="110" y="424" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">test_package_verify · test_v10_release_gate · test_sign_and_notarize</text>
  <text x="110" y="452" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">test_create_release_zip · test_build_and_run · git diff --check</text>
  <text x="110" y="480" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">swift build · swift test (127 Swift Testing tests / 20 suites)</text>

  <rect x="82" y="528" width="1036" height="126" rx="16" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="110" y="566" fill="#bfdbfe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" font-weight="700">Artifact check</text>
  <text x="110" y="602" fill="#dbeafe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">package_verify dist/LithePG.app: PASS</text>
  <text x="110" y="630" fill="#dbeafe" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">v10 artifact-only preflight: clear; app icon present; executable under budget</text>

  <text x="82" y="690" fill="#cbd5e1" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16">Docker dogfood gate attempted but blocked locally: docker command unavailable. No signing/notary/upload/tag/cron/Telegram action attempted.</text>
