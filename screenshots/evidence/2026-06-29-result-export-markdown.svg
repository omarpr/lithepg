<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">LithePG Markdown export evidence</title>
  <desc id="desc">Visual receipt showing strict TDD red/green verification for adding a GitHub-flavored Markdown table export format to the on-device ResultExporter and wiring it into the results-grid export menu.</desc>
  <rect width="1200" height="780" fill="#0f172a"/>
  <rect x="42" y="36" width="1116" height="708" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="72" y="88" fill="#e5e7eb" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="34" font-weight="700">LithePG export: GitHub-flavored Markdown tables</text>
  <text x="72" y="126" fill="#93c5fd" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">2026-06-29 · v1.1 backlog: export formats beyond CSV (JSON ✓, Markdown ✓)</text>

  <rect x="72" y="158" width="1056" height="104" rx="16" fill="#1e293b" stroke="#334155"/>
  <text x="104" y="196" fill="#fca5a5" font-family="SF Mono, Menlo, Consolas, monospace" font-size="20" font-weight="700">RED</text>
  <text x="170" y="196" fill="#e5e7eb" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">swift test --filter ResultExporter</text>
  <text x="104" y="230" fill="#fecaca" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">failed to compile as expected: type 'ResultExporter.Format' has no member 'markdown' (5 core tests written first)</text>

  <rect x="72" y="282" width="1056" height="170" rx="16" fill="#052e16" stroke="#22c55e"/>
  <text x="104" y="320" fill="#86efac" font-family="SF Mono, Menlo, Consolas, monospace" font-size="20" font-weight="700">GREEN</text>
  <text x="190" y="320" fill="#dcfce7" font-family="SF Mono, Menlo, Consolas, monospace" font-size="17">ResultExporter.markdown(for:) + Format.markdown (.md) + export(_:as:)</text>
  <text x="104" y="354" fill="#bbf7d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">Header | delimiter | one row per record. Pipe + backslash escaped; CR/LF -&gt; &lt;br&gt;; NULL renders blank.</text>
  <text x="104" y="384" fill="#bbf7d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">No-columns result -&gt; "". Results-grid export Menu gains a Markdown (.md) item via NSSavePanel.</text>
  <text x="104" y="414" fill="#bbf7d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">Pure reformat of already-fetched rows · no network, no credentials, no SQL execution, nothing auto-run.</text>

  <rect x="72" y="472" width="1056" height="146" rx="16" fill="#0b1f33" stroke="#334155"/>
  <text x="104" y="508" fill="#7dd3fc" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16" font-weight="700">Sample output (rows id,name = 1/Ada, 2/Grace):</text>
  <text x="104" y="540" fill="#e2e8f0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16">| id | name |</text>
  <text x="104" y="566" fill="#e2e8f0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16">| --- | --- |</text>
  <text x="104" y="592" fill="#e2e8f0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16">| 1 | Ada |  ·  | 2 | Grace |</text>

  <rect x="72" y="638" width="1056" height="92" rx="16" fill="#020617" stroke="#475569"/>
  <text x="104" y="672" fill="#38bdf8" font-family="SF Mono, Menlo, Consolas, monospace" font-size="18" font-weight="700">Verification</text>
  <text x="320" y="672" fill="#e2e8f0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">✓ swift test: 146 tests / 21 suites (was 141) — no regressions · ✓ swift build clean</text>
  <text x="104" y="702" fill="#e2e8f0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="15">✓ static added-line secret/injection scan: no findings · independent reviewer dispatched on diff</text>
  <text x="104" y="724" fill="#fbbf24" font-family="SF Mono, Menlo, Consolas, monospace" font-size="14">↷ dogfood_check not run: non-release-impacting core/UI addition; Docker unavailable in cron env</text>
</svg>
