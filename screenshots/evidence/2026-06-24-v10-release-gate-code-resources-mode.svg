<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 code signature resource mode gate evidence</title>
  <desc id="desc">Visual evidence for the release artifact preflight hardening that rejects unsafe CodeResources file modes.</desc>
  <rect width="1200" height="720" fill="#0b1020"/>
  <rect x="40" y="40" width="1120" height="640" rx="24" fill="#101827" stroke="#6ee7b7" stroke-width="3"/>
  <text x="80" y="105" fill="#6ee7b7" font-family="Menlo, Consolas, monospace" font-size="30" font-weight="700">v1.0 release artifact hardening</text>
  <text x="80" y="150" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="22">Slice: reject unsafe CodeResources file modes in LithePG.app.zip</text>

  <rect x="80" y="190" width="1040" height="150" rx="14" fill="#172033" stroke="#334155"/>
  <text x="110" y="230" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="20">RED</text>
  <text x="190" y="230" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">./script/test_v10_release_gate.sh</text>
  <text x="110" y="270" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">failed as expected before the production fix:</text>
  <text x="110" y="305" fill="#fca5a5" font-family="Menlo, Consolas, monospace" font-size="16">artifact-only gate unexpectedly passed with unsafe release artifact code signature resources mode</text>

  <rect x="80" y="370" width="1040" height="190" rx="14" fill="#172033" stroke="#334155"/>
  <text x="110" y="410" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="20">GREEN</text>
  <text x="210" y="410" fill="#e5e7eb" font-family="Menlo, Consolas, monospace" font-size="18">release gate now reports:</text>
  <text x="110" y="450" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">Release artifact code signature resources: invalid</text>
  <text x="110" y="485" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">v1.0 artifact-only blocked</text>
  <text x="110" y="520" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="17">No file mode, SHA-256, artifact path, or fixture sentinel leaked.</text>

  <rect x="80" y="590" width="1040" height="55" rx="12" fill="#052e2b" stroke="#14b8a6"/>
  <text x="110" y="625" fill="#ccfbf1" font-family="Menlo, Consolas, monospace" font-size="18">Verification: release-helper suites, package/artifact preflight, swift build, swift test (127 tests) passed.</text>
</svg>
