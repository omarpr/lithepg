<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app icon ICNS element-table gate evidence</title>
  <desc id="desc">Visual evidence for the 2026-06-23 release-helper hardening that validates ICNS element table structure in package and release artifact gates.</desc>
  <rect width="1200" height="720" fill="#0b1020"/>
  <rect x="32" y="32" width="1136" height="656" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
  <text x="64" y="88" fill="#e5f2ff" font-family="Menlo, monospace" font-size="30" font-weight="700">LithePG v1.0 release-helper hardening</text>
  <text x="64" y="128" fill="#93c5fd" font-family="Menlo, monospace" font-size="18">Slice: validate AppIcon.icns internal element table</text>

  <rect x="64" y="168" width="1072" height="108" rx="14" fill="#1f2937" stroke="#ef4444" stroke-width="2"/>
  <text x="88" y="202" fill="#fecaca" font-family="Menlo, monospace" font-size="18" font-weight="700">RED</text>
  <text x="88" y="232" fill="#f8fafc" font-family="Menlo, monospace" font-size="15">bash script/test_package_verify.sh → failed: accepted malformed ICNS element table</text>
  <text x="88" y="258" fill="#f8fafc" font-family="Menlo, monospace" font-size="15">bash script/test_v10_release_gate.sh → failed: artifact-only gate accepted malformed app icon</text>

  <rect x="64" y="304" width="1072" height="168" rx="14" fill="#0f2f25" stroke="#22c55e" stroke-width="2"/>
  <text x="88" y="338" fill="#bbf7d0" font-family="Menlo, monospace" font-size="18" font-weight="700">GREEN</text>
  <text x="88" y="368" fill="#dcfce7" font-family="Menlo, monospace" font-size="15">package_verify.sh parses ICNS header + element records with sanitized /usr/bin/perl</text>
  <text x="88" y="394" fill="#dcfce7" font-family="Menlo, monospace" font-size="15">v10_release_gate.sh parses zipped AppIcon.icns with isolated /usr/bin/python3 -I</text>
  <text x="88" y="420" fill="#dcfce7" font-family="Menlo, monospace" font-size="15">Focused scripts passed: test_package_verify, test_v10_release_gate, test_sign_and_notarize, test_create_release_zip</text>
  <text x="88" y="446" fill="#dcfce7" font-family="Menlo, monospace" font-size="15">Full Swift gate passed: swift build + swift test (127 Swift Testing tests across 20 suites)</text>

  <rect x="64" y="500" width="1072" height="116" rx="14" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="88" y="534" fill="#bfdbfe" font-family="Menlo, monospace" font-size="18" font-weight="700">Artifact checks</text>
  <text x="88" y="564" fill="#dbeafe" font-family="Menlo, monospace" font-size="15">./script/package_verify.sh dist/LithePG.app → Package verified: LithePG.app</text>
  <text x="88" y="590" fill="#dbeafe" font-family="Menlo, monospace" font-size="15">./script/v10_release_gate.sh --artifact-only → v1.0 artifact-only preflight is clear</text>

  <text x="64" y="650" fill="#fbbf24" font-family="Menlo, monospace" font-size="15">Dogfood note: Docker unavailable in this cron environment; dogfood_check stopped before seeded Postgres startup.</text>
</svg>
