<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v10 release gate duplicate ICNS element evidence</title>
  <desc id="desc">Visual evidence for the v1.0 release artifact preflight hardening slice. It records the failing RED test before implementation and passing verification commands after implementation.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="640" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="92" fill="#e2e8f0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="700">LithePG v1.0 artifact preflight hardening</text>
  <text x="80" y="132" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">2026-06-23 · duplicate ICNS image element gate · no secrets or local DB data</text>

  <rect x="80" y="170" width="1040" height="158" rx="14" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="210" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">RED</text>
  <text x="110" y="248" fill="#e2e8f0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ bash -n script/test_v10_release_gate.sh &amp;&amp; ./script/test_v10_release_gate.sh</text>
  <text x="110" y="284" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">test_v10_release_gate failed: artifact-only gate unexpectedly passed with</text>
  <text x="110" y="310" fill="#fecaca" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">duplicate ICNS image elements in release artifact app icon</text>

  <rect x="80" y="360" width="1040" height="226" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="400" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">GREEN / VERIFY</text>
  <text x="110" y="438" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ bash -n script/v10_release_gate.sh script/test_v10_release_gate.sh &amp;&amp; ./script/test_v10_release_gate.sh</text>
  <text x="110" y="472" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">test_v10_release_gate passed</text>
  <text x="110" y="514" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer swift test</text>
  <text x="110" y="548" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">Test run with 127 tests in 20 suites passed</text>

  <rect x="80" y="616" width="1040" height="38" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="641" fill="#bfdbfe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16">Artifact-only preflight: Release artifact app icon present · executable under budget · SHA-256 matches · clear</text>
</svg>
