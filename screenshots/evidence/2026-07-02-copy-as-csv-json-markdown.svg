<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="-apple-system, SF Pro, Helvetica, Arial, sans-serif">
  <rect width="920" height="560" fill="#1e1e24"/>
  <rect x="0" y="0" width="920" height="52" fill="#2b2b33"/>
  <text x="24" y="33" fill="#f5f5f7" font-size="19" font-weight="700">LithePG · Results — Copy as CSV / JSON / Markdown</text>
  <text x="770" y="33" fill="#7ee787" font-size="13" font-weight="600">v1.1 backlog</text>

  <!-- action bar -->
  <rect x="0" y="52" width="920" height="44" fill="#26262e"/>
  <text x="24" y="79" fill="#f5f5f7" font-size="15" font-weight="700" font-family="SF Mono, monospace">2</text>
  <text x="46" y="79" fill="#9a9aa5" font-size="12">2 rows · 84 ms</text>
  <rect x="150" y="66" width="74" height="18" rx="9" fill="#3a3a44"/>
  <text x="160" y="79" fill="#9a9aa5" font-size="11" font-weight="600">Complete</text>

  <!-- copy split button highlighted -->
  <rect x="690" y="62" width="44" height="26" rx="6" fill="#2f6f4f" stroke="#7ee787" stroke-width="1.5"/>
  <text x="705" y="79" fill="#e6ffe6" font-size="14">⎘</text>
  <rect x="742" y="62" width="34" height="26" rx="6" fill="#3a3a44"/>
  <text x="753" y="79" fill="#9a9aa5" font-size="13">⬇</text>

  <!-- dropdown menu -->
  <rect x="600" y="92" width="200" height="176" rx="9" fill="#33333d" stroke="#4a4a56" stroke-width="1"/>
  <text x="618" y="120" fill="#f5f5f7" font-size="13">Copy (TSV)</text>
  <line x1="612" y1="134" x2="788" y2="134" stroke="#4a4a56" stroke-width="1"/>
  <rect x="606" y="142" width="188" height="26" rx="5" fill="#3d5a46"/>
  <text x="618" y="160" fill="#e6ffe6" font-size="13" font-weight="600">Copy as CSV</text>
  <text x="618" y="192" fill="#f5f5f7" font-size="13">Copy as JSON</text>
  <text x="618" y="224" fill="#f5f5f7" font-size="13">Copy as Markdown</text>
  <text x="770" y="224" fill="#7ee787" font-size="12">.md</text>

  <!-- results grid -->
  <rect x="24" y="292" width="872" height="34" fill="#2b2b33"/>
  <text x="40" y="314" fill="#c9c9d4" font-size="12" font-weight="600" font-family="SF Mono, monospace">#</text>
  <text x="96" y="314" fill="#c9c9d4" font-size="12" font-weight="600" font-family="SF Mono, monospace">id  INTEGER</text>
  <text x="360" y="314" fill="#c9c9d4" font-size="12" font-weight="600" font-family="SF Mono, monospace">note  TEXT</text>

  <rect x="24" y="326" width="872" height="30" fill="#22222a"/>
  <text x="40" y="346" fill="#9a9aa5" font-size="12" font-family="SF Mono, monospace">1</text>
  <text x="96" y="346" fill="#f5f5f7" font-size="12" font-family="SF Mono, monospace">1</text>
  <text x="360" y="346" fill="#f5f5f7" font-size="12" font-family="SF Mono, monospace">a,b</text>
  <rect x="24" y="356" width="872" height="30" fill="#1e1e24"/>
  <text x="40" y="376" fill="#9a9aa5" font-size="12" font-family="SF Mono, monospace">2</text>
  <text x="96" y="376" fill="#f5f5f7" font-size="12" font-family="SF Mono, monospace">2</text>
  <text x="360" y="376" fill="#6f6f7a" font-size="12" font-family="SF Mono, monospace">NULL</text>

  <!-- clipboard preview -->
  <rect x="24" y="404" width="872" height="132" rx="8" fill="#141418" stroke="#3a3a44" stroke-width="1"/>
  <text x="40" y="426" fill="#7ee787" font-size="12" font-weight="700">Clipboard after "Copy as Markdown" (paste into a PR):</text>
  <text x="40" y="452" fill="#c9c9d4" font-size="12" font-family="SF Mono, monospace">| id | note |</text>
  <text x="40" y="470" fill="#c9c9d4" font-size="12" font-family="SF Mono, monospace">| --- | --- |</text>
  <text x="40" y="488" fill="#c9c9d4" font-size="12" font-family="SF Mono, monospace">| 1 | a,b |</text>
  <text x="40" y="506" fill="#c9c9d4" font-size="12" font-family="SF Mono, monospace">| 2 |  |</text>
  <text x="40" y="528" fill="#6f6f7a" font-size="11">On-device string reformat of already-fetched rows · no network · no SQL execution</text>

  <text x="600" y="452" fill="#7ee787" font-size="12" font-weight="600">✔ 156 tests / 23 suites pass</text>
  <text x="600" y="472" fill="#9a9aa5" font-size="11">swift build: Build complete</text>
  <text x="600" y="492" fill="#9a9aa5" font-size="11">TDD: RED → GREEN → verify</text>
  <text x="600" y="512" fill="#9a9aa5" font-size="11">byte-for-byte parity w/ file Export</text>
</svg>
