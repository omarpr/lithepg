<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG package verifier Resources directory gate evidence</title>
  <desc id="desc">Visual evidence for the 2026-06-24 package verifier hardening slice: RED failed before the production fix, GREEN passed after requiring Contents/Resources to be a real safe directory.</desc>
  <rect width="1200" height="720" fill="#0d1117"/>
  <rect x="36" y="32" width="1128" height="656" rx="24" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="72" y="92" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="30" font-weight="700">LithePG v1.0 package verifier hardening</text>
  <text x="72" y="135" fill="#8b949e" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">2026-06-24 07:06 EDT • Commit evidence artifact</text>

  <rect x="72" y="172" width="1056" height="144" rx="14" fill="#230f14" stroke="#f85149" stroke-width="2"/>
  <text x="100" y="212" fill="#ff7b72" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="700">RED</text>
  <text x="100" y="252" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="19">./script/test_package_verify.sh</text>
  <text x="100" y="286" fill="#ffa198" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">failed as expected: expected output to contain “Contents/Resources directory must be a non-symlink directory”</text>

  <rect x="72" y="344" width="1056" height="144" rx="14" fill="#0f2419" stroke="#3fb950" stroke-width="2"/>
  <text x="100" y="384" fill="#56d364" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="700">GREEN</text>
  <text x="100" y="424" fill="#f0f6fc" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="19">bash -n script/package_verify.sh script/test_package_verify.sh &amp;&amp; ./script/test_package_verify.sh</text>
  <text x="100" y="458" fill="#7ee787" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">test_package_verify passed</text>

  <rect x="72" y="516" width="1056" height="112" rx="14" fill="#111827" stroke="#58a6ff" stroke-width="2"/>
  <text x="100" y="556" fill="#79c0ff" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="700">Changed gate</text>
  <text x="100" y="596" fill="#c9d1d9" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">script/package_verify.sh now rejects symlinked or unsafe Contents/Resources directories before reading AppIcon.icns.</text>
</svg>
