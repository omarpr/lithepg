<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">LithePG app icon ICNS size gate evidence</title>
  <desc id="desc">Visual receipt for the v1.0 release-helper hardening that requires AppIcon.icns declared ICNS size to match the actual file size.</desc>
  <rect width="1280" height="760" fill="#0b1020"/>
  <rect x="36" y="34" width="1208" height="692" rx="28" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="72" y="92" fill="#e5f2ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="700">LithePG v1.0 release gate: ICNS declared-size validation</text>
  <text x="72" y="132" fill="#93c5fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">2026-06-23 03:57 EDT · local cron output only · no publication side effects</text>
  <rect x="72" y="166" width="1136" height="128" rx="16" fill="#0f172a" stroke="#334155"/>
  <text x="98" y="206" fill="#f8fafc" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Hardened behavior</text>
  <text x="98" y="240" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">package_verify.sh: AppIcon.icns header must be 8 bytes, magic “icns”, declared length == actual bytes.</text>
  <text x="98" y="270" fill="#cbd5e1" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">v10_release_gate.sh: release zip artifact rejects malformed/mismatched app-icon ICNS entries.</text>
  <rect x="72" y="322" width="548" height="178" rx="16" fill="#052e16" stroke="#22c55e"/>
  <text x="98" y="360" fill="#bbf7d0" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">RED checks reproduced on HEAD</text>
  <text x="98" y="396" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">test_package_verify.sh → failed as expected</text>
  <text x="98" y="426" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">accepted mismatched AppIcon.icns length</text>
  <text x="98" y="462" fill="#dcfce7" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">test_v10_release_gate.sh → failed as expected</text>
  <rect x="660" y="322" width="548" height="178" rx="16" fill="#082f49" stroke="#38bdf8"/>
  <text x="686" y="360" fill="#bae6fd" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">GREEN verification</text>
  <text x="686" y="396" fill="#e0f2fe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">package/v10/sign/create-release shell tests passed</text>
  <text x="686" y="426" fill="#e0f2fe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">bash -n + git diff --check passed</text>
  <text x="686" y="462" fill="#e0f2fe" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">swift build + swift test passed (127 tests / 20 suites)</text>
  <rect x="72" y="528" width="1136" height="138" rx="16" fill="#1e1b4b" stroke="#818cf8"/>
  <text x="98" y="566" fill="#e0e7ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">Artifact gate status</text>
  <text x="98" y="602" fill="#eef2ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">./script/package_verify.sh dist/LithePG.app → Package verified</text>
  <text x="98" y="632" fill="#eef2ff" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18">v10_release_gate.sh --artifact-only → app icon present, SHA-256 matches, preflight clear</text>
