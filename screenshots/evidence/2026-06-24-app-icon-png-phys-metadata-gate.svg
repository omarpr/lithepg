<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 app-icon PNG pHYs metadata gate evidence</title>
  <desc id="desc">Visual evidence for the commit that rejects pHYs physical pixel-density metadata in release app icons.</desc>
  <rect width="1200" height="720" fill="#101827"/>
  <rect x="36" y="36" width="1128" height="648" rx="28" fill="#172033" stroke="#65d6ad" stroke-width="3"/>
  <text x="72" y="96" fill="#f8fafc" font-family="SF Mono, Menlo, Consolas, monospace" font-size="32" font-weight="700">LithePG v1.0 release gate</text>
  <text x="72" y="138" fill="#a7f3d0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="23">PNG-backed AppIcon.icns now rejects pHYs metadata</text>

  <g font-family="SF Mono, Menlo, Consolas, monospace" font-size="21">
    <text x="82" y="205" fill="#fca5a5">RED</text>
    <text x="170" y="205" fill="#e5e7eb">test_package_verify failed on accepted pHYs metadata fixture</text>
    <text x="170" y="238" fill="#e5e7eb">test_v10_release_gate failed on accepted artifact pHYs metadata fixture</text>

    <text x="82" y="310" fill="#86efac">GREEN</text>
    <text x="170" y="310" fill="#e5e7eb">bash -n package/release gate scripts: passed</text>
    <text x="170" y="343" fill="#e5e7eb">./script/test_package_verify.sh: passed</text>
    <text x="170" y="376" fill="#e5e7eb">./script/test_v10_release_gate.sh: passed</text>
    <text x="170" y="409" fill="#e5e7eb">./script/package_verify.sh dist/LithePG.app: passed</text>
    <text x="170" y="442" fill="#e5e7eb">swift build + swift test: 127 tests passed</text>
    <text x="170" y="475" fill="#e5e7eb">artifact-only preflight: clear; app icon present; code signature valid</text>

    <text x="82" y="548" fill="#93c5fd">POLICY</text>
    <text x="170" y="548" fill="#e5e7eb">No signing/notarization/upload/tag/publication attempted</text>
    <text x="170" y="581" fill="#e5e7eb">Docker dogfood gate skipped: docker-missing</text>
    <text x="170" y="614" fill="#e5e7eb">Fixture marker and artifact paths remain redacted from gate output</text>
  </g>

  <rect x="72" y="650" width="1056" height="2" fill="#2dd4bf" opacity="0.55"/>
  <text x="72" y="670" fill="#94a3b8" font-family="SF Mono, Menlo, Consolas, monospace" font-size="16">screenshots/evidence/2026-06-24-app-icon-png-phys-metadata-gate.svg</text>
</svg>
