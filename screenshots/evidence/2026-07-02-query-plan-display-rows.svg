<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" font-family="-apple-system, SF Pro Text, Helvetica, Arial, sans-serif">
  <rect width="760" height="500" fill="#1e1e2e"/>
  <rect x="0" y="0" width="760" height="46" fill="#181825"/>
  <circle cx="22" cy="23" r="6" fill="#f38ba8"/>
  <circle cx="42" cy="23" r="6" fill="#f9e2af"/>
  <circle cx="62" cy="23" r="6" fill="#a6e3a1"/>
  <text x="96" y="28" fill="#cdd6f4" font-size="14" font-weight="600">LithePG — QueryPlan.displayRows (headless plan-tree rows)</text>

  <text x="24" y="78" fill="#89b4fa" font-size="13" font-weight="700">v1.1 backlog · EXPLAIN visualization slice 4</text>
  <text x="24" y="98" fill="#a6adc8" font-size="12">Pure, fixture-tested flatten of an EXPLAIN plan tree into indented rows —</text>
  <text x="24" y="115" fill="#a6adc8" font-size="12">depth, cost-share %, and a single costliest flag. No network / creds / SQL run.</text>

  <!-- flattened rows preview -->
  <rect x="24" y="135" width="712" height="150" rx="8" fill="#11111b" stroke="#313244"/>
  <text x="40" y="160" fill="#f5c2e7" font-size="12" font-family="SF Mono, Menlo, monospace">depth  node                                  cost%   costliest</text>
  <text x="40" y="184" fill="#cdd6f4" font-size="12" font-family="SF Mono, Menlo, monospace">  0    Hash Join (cost=1.50..45.20)          100.0%     ★</text>
  <text x="40" y="206" fill="#cdd6f4" font-size="12" font-family="SF Mono, Menlo, monospace">  1    -&gt; Seq Scan on orders (30.00)          66.4%</text>
  <text x="40" y="228" fill="#cdd6f4" font-size="12" font-family="SF Mono, Menlo, monospace">  1    -&gt; Hash (10.00)                        22.1%</text>
  <text x="40" y="250" fill="#cdd6f4" font-size="12" font-family="SF Mono, Menlo, monospace">    2  -&gt; Seq Scan on customers (10.00)       22.1%</text>
  <text x="40" y="274" fill="#6c7086" font-size="11" font-family="SF Mono, Menlo, monospace">ids [0,1,2,3] · pre-order · Identifiable for SwiftUI list</text>

  <!-- test results -->
  <rect x="24" y="300" width="712" height="130" rx="8" fill="#11111b" stroke="#313244"/>
  <text x="40" y="324" fill="#a6e3a1" font-size="12" font-family="SF Mono, Menlo, monospace">✔ QueryPlan suite: 16 tests passed (12 prior + 4 new)</text>
  <text x="40" y="346" fill="#cdd6f4" font-size="11" font-family="SF Mono, Menlo, monospace">  ✔ flattens a plain plan into a single display row</text>
  <text x="40" y="366" fill="#cdd6f4" font-size="11" font-family="SF Mono, Menlo, monospace">  ✔ flattens a nested plan into pre-order rows with depth and cost share</text>
  <text x="40" y="386" fill="#cdd6f4" font-size="11" font-family="SF Mono, Menlo, monospace">  ✔ display rows omit cost share when the root has no total cost</text>
  <text x="40" y="406" fill="#cdd6f4" font-size="11" font-family="SF Mono, Menlo, monospace">  ✔ display rows never expose connection secrets</text>
  <text x="40" y="424" fill="#a6e3a1" font-size="12" font-family="SF Mono, Menlo, monospace">✔ Full suite: 172 tests in 24 suites passed · build clean</text>

  <text x="24" y="462" fill="#6c7086" font-size="11">RED: compile fails "no member displayRows" → GREEN: 172 pass → static scan clean</text>
  <text x="24" y="482" fill="#6c7086" font-size="11">2026-07-02 · Boris watchdog · UI wiring deferred to a follow-up slice</text>
</svg>
