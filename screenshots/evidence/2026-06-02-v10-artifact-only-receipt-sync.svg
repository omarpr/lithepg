<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LithePG v1.0 artifact-only receipt sync evidence</title>
  <desc id="desc">Visual receipt for syncing the committed artifact-only release gate into the dogfood log.</desc>
  <rect width="1200" height="720" fill="#0b1020"/>
  <rect x="48" y="44" width="1104" height="632" rx="28" fill="#111827" stroke="#a78bfa" stroke-width="3"/>
  <text x="90" y="116" fill="#f5f3ff" font-family="Menlo, Consolas, monospace" font-size="34" font-weight="700">Dogfood Log Receipt Sync</text>
  <text x="90" y="162" fill="#c4b5fd" font-family="Menlo, Consolas, monospace" font-size="22">v1.0 artifact-only release gate • 2026-06-02 17:36 EDT</text>

  <rect x="90" y="210" width="1020" height="76" rx="14" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="122" y="255" fill="#e0e7ff" font-family="Menlo, Consolas, monospace" font-size="23">Commit synced: 4895035 [verified] feat(release): add v1.0 artifact-only gate</text>

  <rect x="90" y="316" width="1020" height="76" rx="14" fill="#052e1a" stroke="#22c55e" stroke-width="2"/>
  <text x="122" y="361" fill="#bbf7d0" font-family="Menlo, Consolas, monospace" font-size="23">Verified in prior slice: v10 gate tests, swift test, dogfood_check passed</text>

  <rect x="90" y="422" width="1020" height="76" rx="14" fill="#3b2610" stroke="#f59e0b" stroke-width="2"/>
  <text x="122" y="467" fill="#fde68a" font-family="Menlo, Consolas, monospace" font-size="22">Artifact-only mode validates zip + SHA; it is not a publication approval</text>

  <rect x="90" y="532" width="1020" height="86" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <text x="122" y="568" fill="#e2e8f0" font-family="Menlo, Consolas, monospace" font-size="20">Changed files: docs/dogfood-log.md + this evidence SVG</text>
  <text x="122" y="600" fill="#cbd5e1" font-family="Menlo, Consolas, monospace" font-size="18">No signing, notarization, upload, Homebrew publication, GitHub Release, tag, or cron change.</text>
</svg>
