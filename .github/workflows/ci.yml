name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Pin to a Xcode version that ships Swift 6.2. `latest-stable` tracks the
      # newest stable Xcode installed on the runner image, which currently ships
      # Swift 6.2+. If the runner image ever drifts below that, pin a specific
      # Xcode (e.g. `16.2`) or swap to a `setup-swift` action.
      - name: Select Xcode
        # maxim-lobanov/setup-xcode v1.6.0
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      # Integration tests (Postgres plain/TLS, SSH tunnel) are gated on env
      # vars (POSTGRES_TEST_URL, POSTGRES_TLS_TEST_URL, POSTGRES_SSH_TEST_TARGET,
      # etc.) and auto-skip here. v0.1 CI runs the unit suite only; wiring a
      # Postgres service and self-signed TLS cert on the runner is a follow-up.
      - name: Test
        run: swift test

      - name: Release binary size gate
        run: |
          swift build -c release --product LithePGApp
          binary=.build/release/LithePGApp
          bytes=$(stat -f%z "$binary")
          mib=$(awk "BEGIN { printf \"%.2f\", $bytes / 1024 / 1024 }")
          warning_bytes=$((30 * 1024 * 1024))
          hard_cap_bytes=$((50 * 1024 * 1024))
          echo "LithePGApp release binary: ${bytes} bytes (${mib} MiB)"
          if [ "$bytes" -gt "$hard_cap_bytes" ]; then
            echo "::error::LithePGApp release binary exceeds the 50 MiB hard cap (${mib} MiB)."
            exit 1
          fi
          if [ "$bytes" -gt "$warning_bytes" ]; then
            echo "::warning::LithePGApp release binary exceeds the 30 MiB stretch goal (${mib} MiB)."
          fi

  security:
    name: Security scans
    # The scanners are cross-platform; Linux runners bill at 1x versus 10x for
    # macOS on private repos, and are free once the repo is public.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install scanners
        # Ubuntu runner images do not ship Homebrew. Binaries are version-pinned
        # and checksum-verified, matching the SHA-pinned actions above.
        run: |
          curl -sSLO https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks_8.30.1_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          curl -sSL -o osv-scanner https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
          echo "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner
          pipx install semgrep

      - name: OSV dependency scan
        run: osv-scanner --lockfile Package.resolved

      - name: Secret scan
        run: gitleaks detect --source . --redact --no-banner

      - name: Semgrep Swift scan
        run: semgrep scan --config p/swift --error
