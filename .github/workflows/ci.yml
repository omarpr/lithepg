name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test (macOS)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Pin to a Xcode version that ships Swift 6.2. `latest-stable` tracks the
      # newest stable Xcode installed on the runner image, which currently ships
      # Swift 6.2+. If the runner image ever drifts below that, pin a specific
      # Xcode (e.g. `16.2`) or swap to a `setup-swift` action.
      - name: Select Xcode
        # maxim-lobanov/setup-xcode v1.6.0
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      # Integration tests (Postgres plain/TLS, SSH tunnel) are gated on env
      # vars (POSTGRES_TEST_URL, POSTGRES_TLS_TEST_URL, POSTGRES_SSH_TEST_TARGET,
      # etc.) and auto-skip here. v0.1 CI runs the unit suite only; wiring a
      # Postgres service and self-signed TLS cert on the runner is a follow-up.
      - name: Test
        run: swift test

      - name: Release binary size gate
        run: |
          swift build -c release --product LithePGApp
          binary=.build/release/LithePGApp
          bytes=$(stat -f%z "$binary")
          mib=$(awk "BEGIN { printf \"%.2f\", $bytes / 1024 / 1024 }")
          warning_bytes=$((30 * 1024 * 1024))
          hard_cap_bytes=$((50 * 1024 * 1024))
          echo "LithePGApp release binary: ${bytes} bytes (${mib} MiB)"
          if [ "$bytes" -gt "$hard_cap_bytes" ]; then
            echo "::error::LithePGApp release binary exceeds the 50 MiB hard cap (${mib} MiB)."
            exit 1
          fi
          if [ "$bytes" -gt "$warning_bytes" ]; then
            echo "::warning::LithePGApp release binary exceeds the 30 MiB stretch goal (${mib} MiB)."
          fi

  security:
    name: Security scans
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install scanners
        run: brew install osv-scanner gitleaks semgrep

      - name: OSV dependency scan
        run: osv-scanner --lockfile Package.resolved

      - name: Secret scan
        run: gitleaks detect --source . --redact --no-banner

      - name: Semgrep Swift scan
        run: semgrep scan --config p/swift --error
