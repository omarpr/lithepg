name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  public:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Swift
    if: github.event_name == 'public' || github.event.repository.private == false
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Match the tested CI toolchain. The runner's default Xcode can lag the
      # Swift 6.2 tools version required by Package.swift.
      - name: Select Xcode
        # maxim-lobanov/setup-xcode v1.6.0
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Initialize CodeQL
        # github/codeql-action v4
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: swift
          queries: security-extended

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        # CodeQL autobuild cannot reliably infer this multi-product SwiftPM
        # package, so compile it explicitly while CodeQL tracing is active.
        run: swift build

      - name: Analyze
        # github/codeql-action v4
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: /language:swift
