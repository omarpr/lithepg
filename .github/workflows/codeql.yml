name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  public:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Swift
    if: github.event_name == 'public' || github.event.repository.private == false
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        # github/codeql-action v4
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          languages: swift
          queries: security-extended

      - name: Build
        # github/codeql-action v4
        uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a

      - name: Analyze
        # github/codeql-action v4
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
        with:
          category: /language:swift
